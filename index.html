  const att=PAYMENTS.filter(p=>p.status==='attesa').reduce((s,p)=>s+p.amount,0)
  /* occupazione reale: ore prenotate / disponibili */
  const occ=STAFF.map(s=>{const hrs=SESSIONS.filter(e=>e.staff===s.id).reduce((t,e)=>t+e.dur,0)
    const avH=Object.values(s.avail).reduce((t,[a,b])=>t+(b-a),0)
    return {name:s.name.split(' ')[0],ava:s.ava,pct:avH?Math.round(hrs/avH*100):0}}).sort((a,b)=>b.pct-a.pct)
  /* clienti a rischio: reali dal campione */
  const risk=CLIENTS.filter(c=>c.status==='sospeso'||c.tok===0||c.lastCheck>45)
  const tokDist=(()=>{const m={};SESSIONS.forEach(e=>{const sv=svcOf(e.svc);if(!sv)return;const n=(e.roster?e.roster.length:1)*sv.tok;m[sv.name]=(m[sv.name]||0)+n})
    const tot=Object.values(m).reduce((a,b)=>a+b,0)||1
    return Object.entries(m).map(([l,v])=>({l,v,p:Math.round(v/tot*100)})).sort((a,b)=>b.v-a.v).slice(0,6)})()
  const selfServ=Math.round(BOOKINGS.filter(b=>b.status!=='cancellata').length/(BOOKINGS.length+4)*100)
  const ba=(k,v,hl)=>`<div style="display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px"><span style="color:var(--ink3)">${k}</span><b style="text-align:right;${hl?'color:var(--accent)':''}">${v}</b></div>`
  C().innerHTML=`
  <div class="sec-head"><h2>Panoramica — ${esc(CENTER.name)}</h2><span class="badge">Super Admin</span></div>
  <div class="cards">
    <div class="kpi"><div class="label">Clienti attivi</div><div class="val">${CLIENT_TOTAL}</div><div class="sub">${risk.length} a rischio nel campione</div></div>
    <div class="kpi"><div class="label">Fatturato (giugno)</div><div class="val">€${(prevRev/1000).toFixed(1)}k</div><div class="sub">luglio in corso: €${(rev/1000).toFixed(1)}k</div></div>

/* ═══════════ OGGI (Reception cockpit) ═══════════ */
function buildRecOggi(){
  const oggi=SESSIONS.filter(e=>e.day===TODAY_DOW).sort((a,b)=>a.start-b.start)
  const daConf=oggi.filter(e=>e.status==='prog')
  const today=todayISO()
  const todayPays=PAYMENTS.filter(p=>p.date===today&&p.status==='pagato')
  const inc=todayPays.reduce((s,p)=>s+p.amount,0)
  C().innerHTML=`
  <div class="sec-head"><h2>Oggi — Reception</h2><span style="font-size:13px;color:var(--ink3)">${dayLbl(TODAY_DOW)}</span></div>
  <div class="cards">
    <div class="kpi"><div class="label">Sessioni oggi</div><div class="val">${oggi.length}</div></div>
    <div class="kpi"><div class="label">Da gestire (check-in)</div><div class="val" style="color:var(--warn)">${daConf.length}</div></div>
    <div class="kpi"><div class="label">Incassi registrati oggi</div><div class="val">€${inc.toFixed(2)}</div><div class="sub">${todayPays.length} movimenti</div></div>
  </div>
  <div class="grid2">
    <div class="panel"><h3>Check-in / presenze</h3>
      ${daConf.length?daConf.map(e=>{const svc=svcOf(e.svc),st=staffOf(e.staff)
        const who=e.roster?`${e.roster.length}/${svc.max} iscritti`:esc(e.client)
        return `<div class="book-card" style="margin-bottom:8px"><div><div class="bl">${who}</div><div class="bm">${esc(svc.name)} · ${st.name.split(' ')[0]} · ${fmt(e.start)}</div></div>
          <div style="display:flex;gap:5px"><button class="btn btn-accent btn-sm" onclick="checkin('${e.id}','svolta')">✓ Presente</button>
          <button class="btn btn-outline btn-sm" onclick="checkin('${e.id}','noshow')">✗ No-show</button></div></div>`}).join(''):'<div style="color:var(--ink3);font-size:13px">Tutto gestito 👍</div>'}
    </div>
    <div class="panel"><h3>Agenda di oggi</h3>
      ${oggi.length?oggi.map(e=>{const st=staffOf(e.staff)
        const mark=e.status==='svolta'?'✓ ':e.status==='noshow'?'✗ ':''
        return `<div class="ex-row" style="cursor:pointer" onclick="openEvt('${e.id}')"><span>${mark}${fmt(e.start)} · ${esc(e.client)}</span><span style="color:var(--ink3);font-size:12px">${st.name.split(' ')[0]}</span></div>`}).join(''):'<div style="color:var(--ink3);font-size:13px">Nessuna sessione oggi.</div>'}
    </div>
  </div>
  <div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap">
    <button class="btn btn-accent" onclick="go('cal')">Apri calendario</button>
    <button class="btn btn-outline" onclick="openNewEvt(null,null,TODAY_DOW)">+ Prenota per un cliente</button>
    <button class="btn btn-outline" onclick="openClientForm()">+ Walk-in</button>
    <button class="btn btn-outline" onclick="go('shop')">Bar / POS</button>
  </div>`
}

  }
}
function avaInner(u){return u&&u.avatarImg?`<img class="ava-img" src="${u.avatarImg}" alt="">`:(u?u.ava:'👤')}
function setTopAva(u){const el=document.getElementById('uAva');if(el)el.innerHTML=avaInner(u)}
function onAvaFile(e){const f=e.target.files[0];if(!f)return
  if(!/^image\//.test(f.type)){toast('Seleziona un file immagine','err');return}
  if(f.size>3*1024*1024){toast('Immagine troppo grande (max 3MB)','err');return}
  const r=new FileReader();r.onload=()=>{CURRENT_USER.avatarImg=r.result
    const box=document.getElementById('prAvaBox');if(box)box.innerHTML=avaInner(CURRENT_USER)+'<div class="ov">Cambia</div>'
    setTopAva(CURRENT_USER);toast('Foto caricata — premi «Salva profilo» per confermare')}
  r.readAsDataURL(f)}
function removeAva(){delete CURRENT_USER.avatarImg;setTopAva(CURRENT_USER);buildImpostazioni();toast('Foto rimossa')}
function changePwd(){
  const g=x=>document.getElementById(x).value
  const err=document.getElementById('pw-err')
  if(g('pw-0')!==DEMO_PWD){err.textContent='Password attuale errata.';return}
  if(g('pw-1').length<8){err.textContent='La nuova password deve avere almeno 8 caratteri.';return}
  if(g('pw-1')!==g('pw-2')){err.textContent='Le password non coincidono.';return}
  audit('Password cambiata');toast('Password aggiornata (demo: al prossimo login usa ancora quella demo)')
  err.textContent=''
}
function toggleUser(id){
  const u=USERS.find(x=>x.id===id);u.active=!u.active
  audit(`${u.active?'Riattivato':'DISATTIVATO'} utente ${u.email}`)
  toast(u.active?`${u.name} riattivato`:`${u.name} disattivato — accesso revocato`,u.active?'ok':'warn')
  buildImpostazioni();saveState()
}
function downloadBackup(){
  const data=JSON.stringify({exported:new Date().toISOString(),CENTER,USERS,CLIENTS,STAFF,SVCS,SESSIONS,BOOKINGS,LEDGER,PAYMENTS,AUDIT,CLINICAL,WORKOUTS,NUTRI},null,1)
  try{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([data],{type:'application/json'}));a.download='gymflow-backup-2026-07-09.json';a.click();toast('Backup scaricato');audit('Backup completo scaricato')}
  catch(e){showModal(`<h2>Backup JSON</h2><textarea rows="12" style="width:100%;background:var(--card2);border:1px solid var(--border2);border-radius:8px;color:var(--ink);font-size:10px;padding:8px">${esc(data)}</textarea><div class="modal-foot"><button class="btn btn-accent" onclick="closeModal()">Chiudi</button></div>`)}
}
function restoreBackup(inp){
  const f=inp.files[0];if(!f)return
  const r=new FileReader()
  r.onload=()=>{try{const s=JSON.parse(r.result)
    if(!s.CLIENTS||!s.SESSIONS)throw new Error('formato non valido')
    replaceArr(CLIENTS,s.CLIENTS);replaceArr(SESSIONS,s.SESSIONS);if(s.BOOKINGS)replaceArr(BOOKINGS,s.BOOKINGS)
    if(s.LEDGER)replaceArr(LEDGER,s.LEDGER);if(s.PAYMENTS)replaceArr(PAYMENTS,s.PAYMENTS);if(s.AUDIT)replaceArr(AUDIT,s.AUDIT)
    if(s.USERS&&s.USERS.length)replaceArr(USERS,s.USERS);if(s.STAFF)replaceArr(STAFF,s.STAFF);if(s.SVCS)replaceArr(SVCS,s.SVCS)
    if(s.WORKOUTS)replaceArr(WORKOUTS,s.WORKOUTS);if(s.NUTRI)replaceArr(NUTRI,s.NUTRI);if(s.MSGS)replaceArr(MSGS,s.MSGS)
    if(s.CLINICAL){Object.keys(CLINICAL).forEach(k=>delete CLINICAL[k]);Object.assign(CLINICAL,s.CLINICAL)}
    Object.assign(CENTER,s.CENTER||{})
    audit('Backup ripristinato');saveState();toast('Backup ripristinato');reRender()
  }catch(e){toast('File non valido: '+e.message,'err')}}
  r.readAsText(f)
}

/* ═══════════ MODAL + VIEWS + INIT ═══════════ */
function showModal(html){document.getElementById('modalBox').innerHTML=html;document.getElementById('overlay').classList.add('open')}
function closeModal(e){if(e&&e.target&&e.target!==document.getElementById('overlay'))return;document.getElementById('overlay').classList.remove('open')}
const VIEWS={cal:buildCal,mycal:buildMyCal,clienti:buildClienti,myclienti:buildMyClienti,staff:buildStaff,servizi:buildServizi,misurazioni:buildMis,gettoni:buildGettoni,shop:buildShop,pagamenti:buildPagamenti,messaggi:buildMsgs,equipment:buildEquip,gcal:buildGcal,booking:openBookingModal,mymis:buildMyMis,mytok:buildMyTok,dash:buildDash,mybookings:buildMyBookings,nutrition:buildNutrition,workout:buildWorkout,panoramica:buildPanoramica,recoggi:buildRecOggi,impostazioni:buildImpostazioni}
initGate()
applyTheme()
