  const todayName=DAYS[TODAY_DOW]
  const w=c.weight[c.weight.length-1]||0, goal=c.goalWeight, start=c.weight[0]||0
  const prog=goal?Math.min(100,Math.max(0,Math.round((start-w)/((start-goal)||1)*100))):0
  let heroHtml=''
  if(up){const svc=svcOf(up.svc),st=staffOf(up.staff)
    heroHtml=`<div class="hero"><div><div class="lbl">⏰ Prossima sessione</div>
      <div class="big">${svc.name}</div><div class="meta">${st.ava} ${esc(st.name)} · ${dayLbl(up.day)} · ${fmt(up.start)}</div></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-accent" onclick="openBookingModal()">＋ Prenota</button><button class="btn btn-outline" onclick="go('mybookings')">Gestisci</button></div></div>`}
  else heroHtml=`<div class="hero"><div><div class="lbl">Nessuna sessione prenotata</div><div class="big">Prenota il tuo prossimo allenamento</div></div>
      <button class="btn btn-accent" onclick="openBookingModal()">＋ Prenota una sessione</button></div>`
  /* risultati: mostrati solo se positivi, stile coerente con gli altri KPI */
  const wins=[]
  if((c.streak||0)>=2)wins.push({em:'🔥',v:c.streak,t:'Settimane di fila'})
  if((c.workouts||0)>0)wins.push({em:'💪',v:c.workouts,t:'Allenamenti fatti'})
  const _wF=c.weight&&c.weight[0],_wL=c.weight&&c.weight[c.weight.length-1]
  if(c.goalWeight&&_wF&&c.goalWeight<_wF&&_wF-_wL>0.05)wins.push({em:'⬇️',v:(_wF-_wL).toFixed(1).replace('.',',')+' kg',t:'Persi finora'})
  if(c.goalWeight&&_wF&&c.goalWeight>_wF&&_wL-_wF>0.05)wins.push({em:'⬆️',v:(_wL-_wF).toFixed(1).replace('.',',')+' kg',t:'Massa guadagnata'})
  const winsHtml=wins.length?`<div class="sub-head" style="margin-top:2px">I tuoi risultati</div>
  <div class="cards" style="margin-bottom:16px">${wins.map(w=>`
    <div class="kpi"><div class="label">${w.em} ${w.t}</div><div class="val" style="color:var(--accent)">${w.v}</div></div>`).join('')}</div>`:''
  C().innerHTML=`
  <div style="font-size:13px;color:var(--ink3);margin-bottom:6px">Ciao ${esc(c.name.split(' ')[0])} 👋 — oggi è ${todayName} ${WEEK_DATES[TODAY_DOW]}</div>
  ${winsHtml}
  ${heroHtml}
  <div class="cards">
    <div class="kpi"><div class="label">Peso attuale</div><div class="val">${w||'—'} kg</div>
      ${goal?`<div class="pbar"><i style="width:${prog}%"></i></div><div class="sub">Obiettivo ${goal} kg · ${prog}% del percorso</div>`:''}</div>
    <div class="kpi"><div class="label">Gettoni</div><div class="val" style="color:var(--accent)">${c.tok}</div><div class="sub"><a style="color:var(--ink3);cursor:pointer;text-decoration:underline" onclick="go('mytok')">vedi movimenti</a></div></div>
    ${np?`<div class="kpi"><div class="label">Calorie di oggi</div><div class="val">${np.kcal}</div><div class="sub">P ${np.p} · C ${np.c} · G ${np.f}</div></div>`:''}
  </div>
  <div class="grid2">${diaryPanel(c,np)}${workoutDashPanel(c,wp)}</div>`
}

/* ═══════════ CLIENTE · PRENOTA (1:1 + classi con posti e lista d'attesa) ═══════════ */
function bookingBody(){
  const c=CLIENTS.find(x=>x.id===CURRENT_CLIENT)
  const svOpts=SVCS.map(s=>`<option value="${s.id}">${esc(s.name)} — 🪙${s.tok}</option>`).join('')
  return `<div class="sec-head" style="margin-bottom:12px"><h2>Prenota una sessione</h2><span class="pill pill-accent">🪙${c.tok}</span></div>
    <div class="form-row"><label>Servizio</label><select class="selin" style="width:100%" id="bk-sv" onchange="buildBookArea()">${svOpts}</select></div>
    <div id="bkArea"></div>`
}
function openBookingModal(){showModal(`${bookingBody()}<div class="modal-foot"><button class="btn btn-outline" onclick="closeModal()">Chiudi</button></div>`);buildBookArea()}
function buildBookArea(){
  const svcId=document.getElementById('bk-sv').value
  const svc=svcOf(svcId)
  const area=document.getElementById('bkArea')
  if(svc.type!=='ONE_TO_ONE'){
    /* classi: mostra le lezioni in programma con posti reali */
    const classes=SESSIONS.filter(e=>e.svc===svcId&&e.status==='prog').sort((a,b)=>a.day-b.day||a.start-b.start)
    const c=CLIENTS.find(x=>x.id===CURRENT_CLIENT)
    area.innerHTML=`<div style="font-size:12px;color:var(--ink3);margin:12px 0 10px">Lezioni in programma questa settimana — posti reali</div>
    ${classes.length?classes.map(e=>{
      const st=staffOf(e.staff);const n=e.roster.length;const full=n>=svc.max
      const joined=e.roster.includes(c.name);const inWl=(e.waitlist||[]).includes(c.name)
      const busyC=gcalBusy(c,e.day,e.start,e.dur)
      if(busyC&&gcalCfg(c).mode==='hide'&&!joined)return ''
      return `<div class="book-card"><div><div class="bl">${esc(svc.name)} <span class="pill ${full?'pill-warn':'pill-ok'}" style="margin-left:6px">${n}/${svc.max} posti</span>${busyC?'<span class="pill pill-warn" style="margin-left:4px">⚠️ conflitto agenda</span>':''}</div>
        <div class="bm">${st.ava} ${esc(st.name)} · ${dayLbl(e.day)} · ${fmt(e.start)}</div></div>
        ${joined?'<span class="pill pill-accent">sei iscritto</span>':inWl?'<span class="pill pill-warn">in lista d’attesa</span>':full
          ?`<button class="btn btn-outline btn-sm" onclick="joinWaitlist('${e.id}')">Lista d’attesa</button>`
          :`<button class="btn btn-accent btn-sm" onclick="askJoinClass('${e.id}')">Iscriviti · 🪙${svc.tok}</button>`}</div>`
    }).join(''):'<div style="color:var(--ink3);font-size:13px">Nessuna lezione in programma per questo servizio.</div>'}`
    return
  }
  const stOpts=STAFF.filter(s=>qualified(s.id,svcId)).map(s=>`<option value="${s.id}">${esc(s.name)} (${s.roles.join(', ')})</option>`).join('')
  area.innerHTML=`
    <div class="form-row"><label>Con chi (solo staff abilitato)</label><select class="selin" style="width:100%" id="bk-st" onchange="buildBookSlots()">${stOpts}</select></div>
    <div style="margin-top:14px"><div style="font-size:12px;color:var(--ink3);margin-bottom:10px">Slot realmente liberi — controllo conflitti e attrezzatura attivo</div>
      <div id="bkSlots"></div></div>`
  buildBookSlots()
}
function buildBookSlots(){
  const stId=document.getElementById('bk-st')?.value;if(!stId){document.getElementById('bkSlots').innerHTML='<div style="color:var(--ink3);font-size:13px">Nessuno staff abilitato a questo servizio.</div>';return}
  const svcId=document.getElementById('bk-sv').value
  const svc=svcOf(svcId), st=staffOf(stId)
  const cB=CLIENTS.find(x=>x.id===CURRENT_CLIENT)
  let html=''
  DAYS.forEach((d,di)=>{
    const av=st.avail[d];if(!av)return
    let btns=''
    for(let h=av[0];h<av[1];h++){
      if(allChecks(stId,svcId,di,h,svc.dur/60).length)continue
      const busy=gcalBusy(cB,di,h,svc.dur/60)
      if(busy&&gcalCfg(cB).mode==='hide')continue
      btns+=`<button class="btn btn-outline btn-sm ${busy?'slot-busy':''}" style="margin:0 5px 5px 0" ${busy?'title="⚠️ Hai un impegno sul tuo Google Calendar in questo orario"':''} onclick="doBook('${stId}',${di},${h})">${h}:00${busy?' ⚠️':''}</button>`
    }
    if(btns) html+=`<div class="slot-day"><div class="dl">${d} ${WEEK_DATES[di]}${di===TODAY_DOW?' · oggi':''}</div>${btns}</div>`
  })
  document.getElementById('bkSlots').innerHTML=html||'<div style="color:var(--ink3);font-size:13px">Nessuno slot disponibile per questo trainer.</div>'
}
function askJoinClass(id){
  const e=SESSIONS.find(x=>x.id===id);const svc=svcOf(e.svc);const c=CLIENTS.find(x=>x.id===CURRENT_CLIENT)
  if(!activePacks(c).some(p=>p.svc===svc.id)&&walletOf(c).tok<svc.tok){noTokModal(svc,c);return}
  showModal(`<h2>Iscriviti — ${esc(svc.name)}</h2>
    <p style="margin-bottom:12px;color:var(--ink2);font-size:13px">${esc(staffOf(e.staff).name)} · ${dayLbl(e.day)} ${fmt(e.start)} · posto ${e.roster.length+1}/${svc.max}</p>
    <div style="background:var(--card2);border:1px solid var(--border2);border-radius:var(--r);padding:12px;margin-bottom:12px;font-size:13px">
      Costo: <b style="color:var(--accent)">${svc.tok} gettoni</b> — si pagano ora, alla prenotazione.</div>
    <div class="modal-foot"><button class="btn btn-outline" onclick="openBookingModal()">Indietro</button>
      <button class="btn btn-accent" onclick="doJoinClass('${id}')">Conferma</button></div>`)
}
function doJoinClass(id){
  const e=SESSIONS.find(x=>x.id===id);const svc=svcOf(e.svc);const c=CLIENTS.find(x=>x.id===CURRENT_CLIENT)
  if(c.status!=='attivo'){toast('Il tuo abbonamento è sospeso: contatta la reception per riattivarlo.','err');return}
  if(e.roster.length>=svc.max){toast('Classe appena riempita — puoi entrare in lista d’attesa','warn');openBookingModal();return}
  if(!activePacks(c).some(p=>p.svc===svc.id)&&walletOf(c).tok<svc.tok){noTokModal(svc,c);return}
  const busyJ=clientBusy(c,e.day,e.start,e.dur);if(busyJ.length){toast(busyJ[0],'err');return}
  chargeFor(c,svc,`${svc.name} — ${dayLbl(e.day)} ${fmt(e.start)}`)
  e.roster.push(c.name)
  BOOKINGS.unshift({id:'b'+Date.now(),client:c.id,staff:e.staff,svc:svc.id,day:e.day,start:e.start,dur:e.dur,date:dayLbl(e.day),status:'confermata',sessId:e.id})
  audit(`${c.name} iscritto a ${svc.name} ${dayLbl(e.day)}`)
  notify(['reception','admin','trainer'],'📅','Nuova iscrizione classe',`${c.name} → ${svc.name} ${dayLbl(e.day)} ${fmt(e.start)}`)
  toast('Iscrizione confermata!');closeModal();reRender();saveState()
}
function joinWaitlist(id){
  const e=SESSIONS.find(x=>x.id===id);const c=CLIENTS.find(x=>x.id===CURRENT_CLIENT)
  if(c.status!=='attivo'){toast('Il tuo abbonamento è sospeso: contatta la reception.','err');return}
  const svcW=svcOf(e.svc)
  if(!activePacks(c).some(p=>p.svc===svcW.id)&&walletOf(c).tok<svcW.tok){noTokModal(svcW,c);return}
  e.waitlist=e.waitlist||[]
  if(e.waitlist.includes(c.name)){toast('Sei già in lista d’attesa.','warn');return}
  e.waitlist.push(c.name)
  audit(`${c.name} in lista d’attesa per ${svcOf(e.svc).name} ${dayLbl(e.day)}`)
  toast('Sei in lista d’attesa — ti avvisiamo se si libera un posto');buildBookArea();saveState()
}
function noTokModal(svc,c){
  showModal(`<h2>Gettoni insufficienti</h2>
    <p style="font-size:13px;color:var(--ink2)">Servono <b>${svc.tok}</b> gettoni, ne hai <b>${c.tok}</b>.</p>
    <div class="modal-foot"><button class="btn btn-outline" onclick="closeModal()">Chiudi</button>
      <button class="btn btn-accent" onclick="closeModal();go('mytok')">Acquista gettoni</button></div>`)
}
function doBook(stId,day,h){
  const c=CLIENTS.find(x=>x.id===CURRENT_CLIENT), sv=svcOf(document.getElementById('bk-sv').value)
  if(c.status!=='attivo'){toast('Il tuo abbonamento è sospeso: contatta la reception per riattivarlo.','err');return}
  if(!activePacks(c).some(p=>p.svc===sv.id)&&walletOf(c).tok<sv.tok){noTokModal(sv,c);return}
  showModal(`<h2>Conferma prenotazione</h2>
    <p style="margin-bottom:12px">${esc(sv.name)}<br><span style="color:var(--ink3);font-size:13px">${esc(staffOf(stId).name)} · ${dayLbl(day)} ${h}:00 · ${sv.dur} min</span></p>
    <div style="background:var(--card2);border:1px solid var(--border2);border-radius:var(--r);padding:12px;margin-bottom:12px;font-size:13px">
      Costo: <strong style="color:var(--accent)">${sv.tok} gettoni</strong> — si pagano ora, alla prenotazione.</div>
    <div class="modal-foot"><button class="btn btn-outline" onclick="openBookingModal()">Indietro</button>
      <button class="btn btn-accent" onclick="confirmBook('${stId}',${day},${h},'${sv.id}')">Conferma</button></div>`)
}
function confirmBook(stId,day,h,svId){
  const c=CLIENTS.find(x=>x.id===CURRENT_CLIENT), sv=svcOf(svId)
  const errs=allChecks(stId,svId,day,h,sv.dur/60)
  errs.push(...clientBusy(c,day,h,sv.dur/60))
  if(errs.length){toast('Impossibile: '+errs[0],'err');openBookingModal();return}
  chargeFor(c,sv,`${sv.name} — ${dayLbl(day)} ${h}:00`)
  const bid='b'+Date.now()
  BOOKINGS.unshift({id:bid,client:c.id,staff:stId,svc:svId,day,start:h,dur:sv.dur/60,date:dayLbl(day),status:'confermata'})
  SESSIONS.push({id:'s_'+bid,bk:bid,staff:stId,svc:svId,client:c.name,clientId:c.id,day,start:h,dur:sv.dur/60,status:'prog'})
  audit(`${c.name} ha prenotato ${sv.name} ${dayLbl(day)} ${h}:00`)
  notify(['reception','admin','trainer'],'📅','Nuova prenotazione',`${c.name} — ${sv.name} ${dayLbl(day)} ${h}:00`)
  showModal(`<div class="pay-ok"><div class="em" style="color:var(--accent)">✓</div><h2 style="margin:8px 0">Prenotazione confermata</h2>
    <p style="color:var(--ink2);font-size:13px">${esc(sv.name)} · ${dayLbl(day)} ${h}:00</p>
    <div style="margin:12px 0;font-size:13px">${sv.tok} gettoni spesi · saldo <b style="color:var(--accent)">${c.tok}</b></div></div>
    <div class="modal-foot"><button class="btn btn-outline" onclick="closeModal();go('mybookings')">Le mie prenotazioni</button>
      <button class="btn btn-accent" onclick="closeModal();reRender()">Fatto</button></div>`)
  saveState()
}

function buildMyBookings(){

function askCancel(id){
  const b=BOOKINGS.find(x=>x.id===id),sv=svcOf(b.svc)
  showModal(`<h2>Cancellare la prenotazione?</h2>
    <p style="font-size:13px;color:var(--ink2);margin-bottom:8px">${esc(sv.name)} · ${esc(b.date)} ${fmt(b.start)}</p>
    <div style="background:var(--card2);border:1px solid var(--border2);border-radius:var(--r);padding:10px;font-size:13px">⚠️ I <b>${sv.tok} gettoni</b> spesi <b>non vengono rimborsati automaticamente</b>. In casi particolari l’amministrazione può accreditarteli.</div>
    <div class="modal-foot"><button class="btn btn-outline" onclick="closeModal()">Indietro</button>
      <button class="btn btn-danger" onclick="cancelBooking('${id}')">Sì, cancella</button></div>`)
}
function cancelBooking(id){
  const b=BOOKINGS.find(x=>x.id===id),sv=svcOf(b.svc),c=CLIENTS.find(x=>x.id===b.client)
  if(!b||b.status!=='confermata'){toast('Prenotazione già gestita.','warn');closeModal();buildMyBookings();return}
  if(b.sessId){const e0=SESSIONS.find(s=>s.id===b.sessId)
    if(!e0||e0.status!=='prog'){b.status='cancellata';toast('La lezione risulta già svolta o cancellata.','warn');closeModal();buildMyBookings();saveState();return}}
  b.status='cancellata'
  if(b.sessId){const e=SESSIONS.find(s=>s.id===b.sessId)
    if(e){const i=e.roster.indexOf(c.name);if(i>-1)e.roster.splice(i,1);promoteWaitlist(e,sv)}}
  else{const si=SESSIONS.findIndex(s=>s.bk===id);if(si>-1)SESSIONS.splice(si,1)}
  audit(`${c.name} ha cancellato ${sv.name} ${esc(b.date)} — nessun rimborso automatico`)
  notify(['reception','admin','trainer'],'❌','Disdetta',`${c.name} — ${sv.name} ${esc(b.date)} ${fmt(b.start)}`)
  toast('Prenotazione cancellata');closeModal();buildMyBookings();saveState()
}
function openModifyBooking(id){
  const b=BOOKINGS.find(x=>x.id===id)
  const stOpts=STAFF.filter(s=>qualified(s.id,b.svc)).map(s=>`<option value="${s.id}" ${s.id===b.staff?'selected':''}>${esc(s.name)}</option>`).join('')
  const dayOpts=DAYS.map((d,i)=>`<option value="${i}" ${i===b.day?'selected':''}>${d} ${WEEK_DATES[i]}</option>`).join('')
  showModal(`<h2>Modifica prenotazione</h2>
    <div class="form-row"><label>Trainer</label><select id="mb-st">${stOpts}</select></div>
    <div style="display:flex;gap:8px">
      <div class="form-row" style="flex:1"><label>Giorno</label><select id="mb-d">${dayOpts}</select></div>
      <div class="form-row" style="flex:1"><label>Ora</label><input type="time" id="mb-t" value="${String(Math.floor(b.start)).padStart(2,'0')}:${b.start%1?'30':'00'}"></div></div>
    <div id="mb-err" style="color:var(--danger);font-size:12px;min-height:14px"></div>
    <div class="modal-foot"><button class="btn btn-outline" onclick="closeModal()">Annulla</button>
      <button class="btn btn-accent" onclick="saveModifyBooking('${id}')">Salva modifiche</button></div>`)
}
function saveModifyBooking(id){
  const b=BOOKINGS.find(x=>x.id===id)
  const nst=document.getElementById('mb-st').value
  const nd=+document.getElementById('mb-d').value
  const [hh,mm]=document.getElementById('mb-t').value.split(':').map(Number)
  const ns=hh+mm/60
  const sess=SESSIONS.find(x=>x.bk===id)
  const errs=allChecks(nst,b.svc,nd,ns,b.dur,sess?.id)
  if(errs.length){document.getElementById('mb-err').innerHTML=errs.map(esc).join('<br>');return}
  b.staff=nst;b.day=nd;b.start=ns;b.date=dayLbl(nd)
  if(sess){sess.staff=nst;sess.day=nd;sess.start=ns}
  audit(`Prenotazione spostata → ${dayLbl(nd)} ${fmt(ns)}`)
  notify(['reception','admin','trainer'],'📅','Spostamento',`${CLIENTS.find(c=>c.id===b.client).name} → ${dayLbl(nd)} ${fmt(ns)}`)
  toast('Prenotazione modificata');closeModal();buildMyBookings();saveState()
}

function curDay(){return DAYS[TODAY_DOW]}

function mealItem(c,slot,np){const wp=c.weekPlan&&c.weekPlan[curDay()];if(wp&&wp[slot])return wp[slot];const m=mainMeals(np)[slot];return m?m.items:'—'}
function mealState(c,slot){return (c.diary&&c.diary[curDay()]&&c.diary[curDay()][slot])||''}
function setMeal(slot,st){const c=CLIENTS.find(x=>x.id===CURRENT_CLIENT),d=curDay();c.diary=c.diary||{};c.diary[d]=c.diary[d]||{};c.diary[d][slot]=c.diary[d][slot]===st?'':st;saveState();buildDash()}
function addWater(dl){const c=CLIENTS.find(x=>x.id===CURRENT_CLIENT),d=curDay();c.water=c.water||{};c.water[d]=Math.max(0,Math.min(12,(c.water[d]||0)+dl));saveState();buildDash()}

let ASSIST_CHRONO=null, ASSIST_REST=null, ASSIST_T0=0, ASSIST_RESTLEFT=0
function mmss(s){s=Math.max(0,Math.floor(s));return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}
function openAssist(){
  const c=CLIENTS.find(x=>x.id===CURRENT_CLIENT), act=WORKOUTS.find(w=>w.active&&w.client===CURRENT_CLIENT)
  const ex=act?act.days[curDay()]||[]:[]
  if(!ex.length){toast('Oggi è rest day 💪','warn');return}
  if(!document.getElementById('assistScreen')){const el=document.createElement('div');el.id='assistScreen';document.body.appendChild(el)}
  ASSIST_T0=Date.now();renderAssist()
  clearInterval(ASSIST_CHRONO);ASSIST_CHRONO=setInterval(()=>{const e=document.getElementById('asChrono');if(e)e.textContent=mmss((Date.now()-ASSIST_T0)/1000)},1000)
}
function renderAssist(){
  const c=CLIENTS.find(x=>x.id===CURRENT_CLIENT), act=WORKOUTS.find(w=>w.active&&w.client===CURRENT_CLIENT)
  const ex=act.days[curDay()]||[], log=trainToday(c)

    ${ex.map((x,i)=>{const dn=log.sets[i]||0
      const chips=Array.from({length:x.s},(_,k)=>`<div class="set-chip ${k<dn?'on':''}" onclick="assistSet(${i},${k+1})">${k+1}</div>`).join('')
      return `<div class="as-ex ${dn>=x.s?'done':''}"><div class="as-exh"><div><div class="tx">${esc(x.ex)}</div><div class="ts">target ${x.s} serie × ${x.r} rip · fatte ${Math.min(dn,x.s)}/${x.s}</div></div>${dn>=x.s?'<span class="pill pill-ok">✓</span>':''}</div>
        <div class="set-chips">${chips}</div></div>`}).join('')}
    <div style="font-size:11px;color:var(--ink3);text-align:center;margin-top:8px">Tocca una serie appena la finisci: parte il timer di recupero.</div></div>

    <div class="as-rest" id="asRest" style="display:none"><div>Recupero <b id="asRestT">01:30</b></div><div style="display:flex;gap:8px"><button class="btn btn-outline btn-sm" onclick="addRest(30)">+30s</button><button class="btn btn-accent btn-sm" onclick="stopRest()">Salta</button></div></div>`
}
function assistSet(i,n){const c=CLIENTS.find(x=>x.id===CURRENT_CLIENT),log=trainToday(c),prev=log.sets[i]||0
  log.sets[i]=(n===prev)?n-1:n;saveState();renderAssist();if(log.sets[i]>prev)startRest(90)}
function startRest(sec){ASSIST_RESTLEFT=sec;const bar=document.getElementById('asRest');if(bar)bar.style.display='flex';const t=document.getElementById('asRestT');if(t)t.textContent=mmss(sec)
  clearInterval(ASSIST_REST);ASSIST_REST=setInterval(()=>{ASSIST_RESTLEFT--;if(ASSIST_RESTLEFT<=0){stopRest();toast('Recupero finito — prossima serie 💪');return}const tt=document.getElementById('asRestT');if(tt)tt.textContent=mmss(ASSIST_RESTLEFT)},1000)}
function addRest(s){ASSIST_RESTLEFT+=s;const t=document.getElementById('asRestT');if(t)t.textContent=mmss(ASSIST_RESTLEFT)}
function stopRest(){clearInterval(ASSIST_REST);ASSIST_REST=null;const bar=document.getElementById('asRest');if(bar)bar.style.display='none'}
function closeAssist(){clearInterval(ASSIST_CHRONO);stopRest();const el=document.getElementById('assistScreen');if(el)el.remove();reRender()}
function finishWorkout(){const c=CLIENTS.find(x=>x.id===CURRENT_CLIENT),log=trainToday(c)

]
function gateCheck(c){
  const w=walletOf(c),why=[]
  if(c.status!=='attivo')why.push('stato: '+c.status)
  const m=w.mship;if(!m)why.push('nessuna iscrizione');else if(new Date(m.until)<new Date())why.push('iscrizione scaduta ('+m.until+')')
  const ce=certState(c);if(ce.cls==='pill-danger')why.push('certificato medico '+ce.k)
  const rs=rateStatus(c);if(rs&&rs.over>0)why.push('rate: in over di '+rs.over+'🪙')
  if(w.tok<0)why.push('saldo gettoni negativo ('+w.tok+')')
  return {ok:!why.length,why}
}
function addRNote(){
  const t=prompt('Nota per la reception:');if(!t)return
  RNOTES.unshift({id:'rn'+Date.now(),txt:t,done:false});saveState();buildRecOggi()
}

function gateFilter(){
  const q=(document.getElementById('gateQ').value||'').toLowerCase().trim()

  const el=document.getElementById('gateQ-l');el.style.display='block'
  el.innerHTML=list.map(c=>`<div class="combo-it" onmousedown="gateSwipe('${c.id}')"><span>${cAva(c,20)} ${esc(c.name)}</span></div>`).join('')||'<div class="combo-it" style="color:var(--ink3)">Nessun cliente</div>'

function gateSwipe(cid){
  const c=CLIENTS.find(x=>x.id===cid)
  document.getElementById('gateQ-l').style.display='none'
  document.getElementById('gateQ').value=c.name
  const r=gateCheck(c)
  const now=new Date();const t=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')
  GATELOG.unshift({t,name:c.name,ok:r.ok,why:r.why.join(' · ')})
  if(!r.ok)notify(['reception','admin'],'🚫','Ingresso negato',`${c.name}: ${r.why[0]}`)
  audit(r.ok?`INGRESSO: ${c.name} ✓`:`INGRESSO NEGATO: ${c.name} — ${r.why.join(' · ')}`)
  document.getElementById('gateResult').innerHTML=r.ok
    ?`<div style="background:rgba(62,207,142,.12);border:1px solid var(--ok);border-radius:12px;padding:16px;text-align:center">

       <div style="font-size:11px;color:var(--ink3);margin-top:6px">la reception vede subito il motivo e lo risolve</div></div>`
  saveState()
}

function avaInner(u){return u&&u.avatarImg?`<img class="ava-img" src="${u.avatarImg}" alt="">`:(u?u.ava:'👤')}
function setTopAva(u){const el=document.getElementById('uAva');if(el)el.innerHTML=avaInner(u)}
function onAvaFile(e){const f=e.target.files[0];if(!f)return
  if(!/^image\//.test(f.type)){toast('Seleziona un file immagine','err');return}
  if(f.size>3*1024*1024){toast('Immagine troppo grande (max 3MB)','err');return}
  const r=new FileReader();r.onload=()=>{CURRENT_USER.avatarImg=r.result
    const box=document.getElementById('prAvaBox');if(box)box.innerHTML=avaInner(CURRENT_USER)+'<div class="ov">Cambia</div>'
    setTopAva(CURRENT_USER);toast('Foto caricata — premi «Salva profilo» per confermare')}
  r.readAsDataURL(f)}
function removeAva(){delete CURRENT_USER.avatarImg;setTopAva(CURRENT_USER);buildImpostazioni();toast('Foto rimossa')}
function changePwd(){
  const g=x=>document.getElementById(x).value
  const err=document.getElementById('pw-err')
  if(g('pw-0')!==DEMO_PWD){err.textContent='Password attuale errata.';return}
  if(g('pw-1').length<8){err.textContent='La nuova password deve avere almeno 8 caratteri.';return}
  if(g('pw-1')!==g('pw-2')){err.textContent='Le password non coincidono.';return}
  audit('Password cambiata');toast('Password aggiornata (demo: al prossimo login usa ancora quella demo)')
  err.textContent=''
}
function openUserForm(){
  const roleOpts=Object.entries(ROLE_LBL).map(([k,l])=>`<option value="${k}">${l}</option>`).join('')
  const stOpts=STAFF.map(st=>`<option value="${st.id}">${esc(st.name)}</option>`).join('')
  showModal(`<h2>+ Nuovo utente</h2>
    <div class="form-row"><label>Nome e Cognome *</label><input id="nu-n" placeholder="Mario Rossi"></div>
    <div class="form-row"><label>Email (per l’accesso) *</label><input type="email" id="nu-e" placeholder="nome@moveowellness.it"></div>
    <div class="form-row"><label>Ruolo</label><select id="nu-r" onchange="document.getElementById('nu-st-row').style.display=this.value==='trainer'?'block':'none';document.getElementById('nu-san-row').style.display=this.value==='trainer'?'flex':'none'">${roleOpts}</select></div>
    <div class="form-row" id="nu-st-row" style="display:none"><label>Collega a membro dello staff (per calendario e clienti)</label>
      <select id="nu-st"><option value="">— nessuno / lo creo dopo —</option>${stOpts}</select></div>
    <div class="set-row" id="nu-san-row" style="display:none;border:none;padding:4px 0"><div class="sl">Accesso cartelle cliniche<small>solo professionisti sanitari (fisioterapista, osteopata…)</small></div>
      <div class="switch" id="nu-san" onclick="this.classList.toggle('on')"></div></div>
    <div id="nu-err" style="color:var(--danger);font-size:12px;min-height:14px"></div>
    <div style="font-size:11.5px;color:var(--ink3);margin-bottom:8px">Password iniziale (demo): <b>${DEMO_PWD}</b> — l’utente potrà cambiarla dal suo profilo. In produzione: invito via email con link di attivazione.</div>
    <div class="modal-foot"><button class="btn btn-outline" onclick="closeModal()">Annulla</button>
      <button class="btn btn-accent" onclick="saveNewUser()">Crea utente</button></div>`)

function saveNewUser(){
  const g=x=>document.getElementById(x)
  const name=g('nu-n').value.trim(), email=g('nu-e').value.trim().toLowerCase(), role=g('nu-r').value
  const err=g('nu-err')
  if(!name||!email){err.textContent='Nome ed email sono obbligatori.';return}
  if(!/.+@.+\..+/.test(email)){err.textContent='Email non valida.';return}
  if(USERS.some(u=>u.email.toLowerCase()===email)){err.textContent='Esiste già un utente con questa email.';return}
  const u={id:'u'+Date.now(),name,email,ava:'👤',role,active:true,last:'mai'}
  if(role==='trainer'){const st=g('nu-st').value;if(st)u.staffId=st
    if(g('nu-san').classList.contains('on'))u.sanitario=true}
  USERS.push(u)
  audit(`CREATO utente ${name} (${email}, ${ROLE_LBL[role]}${u.sanitario?', sanitario':''}) da ${CURRENT_USER.name}`)
  notify(['admin'],'👤','Nuovo utente',`${name} — ${ROLE_LBL[role]}`)
  toast(`Utente creato — può accedere con «${DEMO_PWD}»`)
  closeModal();saveState();buildImpostazioni()
}
function toggleUser(id){
  const u=USERS.find(x=>x.id===id);u.active=!u.active
  audit(`${u.active?'Riattivato':'DISATTIVATO'} utente ${u.email}`)
  toast(u.active?`${u.name} riattivato`:`${u.name} disattivato — accesso revocato`,u.active?'ok':'warn')
  buildImpostazioni();saveState()
}
let _tsRows=[]
function tsImportPreview(e){
  const f=e.target.files[0];if(!f)return
  const r=new FileReader()
  r.onload=()=>{
    const lines=r.result.split(/\r?\n/).filter(x=>x.trim())
    const start=/nome|name/i.test(lines[0])?1:0
    _tsRows=lines.slice(start).map(l=>{const p=l.split(/[;,\t]/).map(x=>x.trim().replace(/^"|"$/g,''))
      return {name:p[0]||'',email:p[1]||'',tel:p[2]||'',tok:+(p[3]||0)||0}}).filter(x=>x.name)
    document.getElementById('tsPrev').innerHTML=_tsRows.length
      ?`<b>${_tsRows.length} clienti pronti</b>: ${_tsRows.slice(0,4).map(x=>esc(x.name)).join(', ')}${_tsRows.length>4?'…':''}
        <div style="margin-top:8px"><button class="btn btn-accent btn-sm" onclick="tsImportGo()">Importa ${_tsRows.length} clienti</button></div>`
      :'<span style="color:var(--danger)">Nessuna riga valida nel file.</span>'
  }
  r.readAsText(f)
}
function tsImportGo(){
  const added=[]
  _tsRows.forEach(rw=>{
    if(CLIENTS.some(c=>c.name.toLowerCase()===rw.name.toLowerCase()))return
    const nid='c'+Date.now()+Math.floor(Math.random()*999)
    CLIENTS.push({id:nid,name:rw.name,email:rw.email,tel:rw.tel,dob:'',cf:'',obj:'',status:'attivo',tok:rw.tok,cumTok:rw.tok,trainer:'marco',since:todayISO(),notes:'Importato da TeamSystem',streak:0,workouts:0,lastCheck:0,weight:[],fat_pct:[],muscle_kg:[],water_pct:[],bmi:[],metage:[]})
    added.push(rw.name)})
  BULK_LOG.unshift({id:'bl'+Date.now(),when:nowStr(),by:CURRENT_USER.name,action:'Import da TeamSystem',n:added.length,items:added,kind:'delete',snap:[]})
  audit(`IMPORT TeamSystem: ${added.length} clienti (${added.slice(0,5).join(', ')}${added.length>5?'…':''})`)
  toast(added.length+' clienti importati ✓');saveState();buildImpostazioni()
}
function downloadBackup(){
  const data=JSON.stringify({exported:new Date().toISOString(),CENTER,USERS,CLIENTS,STAFF,SVCS,SESSIONS,BOOKINGS,LEDGER,PAYMENTS,AUDIT,CLINICAL,WORKOUTS,NUTRI},null,1)
  try{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([data],{type:'application/json'}));a.download='gymflow-backup-2026-07-09.json';a.click();toast('Backup scaricato');audit('Backup completo scaricato')}
  catch(e){showModal(`<h2>Backup JSON</h2><textarea rows="12" style="width:100%;background:var(--card2);border:1px solid var(--border2);border-radius:8px;color:var(--ink);font-size:10px;padding:8px">${esc(data)}</textarea><div class="modal-foot"><button class="btn btn-accent" onclick="closeModal()">Chiudi</button></div>`)}
}
function restoreBackup(inp){
  const f=inp.files[0];if(!f)return
  const r=new FileReader()
  r.onload=()=>{try{const s=JSON.parse(r.result)
    if(!s.CLIENTS||!s.SESSIONS)throw new Error('formato non valido')
    replaceArr(CLIENTS,s.CLIENTS);replaceArr(SESSIONS,s.SESSIONS);if(s.BOOKINGS)replaceArr(BOOKINGS,s.BOOKINGS)
    if(s.LEDGER)replaceArr(LEDGER,s.LEDGER);if(s.PAYMENTS)replaceArr(PAYMENTS,s.PAYMENTS);if(s.AUDIT)replaceArr(AUDIT,s.AUDIT)
    if(s.USERS&&s.USERS.length)replaceArr(USERS,s.USERS);if(s.STAFF)replaceArr(STAFF,s.STAFF);if(s.SVCS)replaceArr(SVCS,s.SVCS)
    if(s.WORKOUTS)replaceArr(WORKOUTS,s.WORKOUTS);if(s.NUTRI)replaceArr(NUTRI,s.NUTRI);if(s.MSGS)replaceArr(MSGS,s.MSGS)
    if(s.CLINICAL){Object.keys(CLINICAL).forEach(k=>delete CLINICAL[k]);Object.assign(CLINICAL,s.CLINICAL)}
    Object.assign(CENTER,s.CENTER||{})
    audit('Backup ripristinato');saveState();toast('Backup ripristinato');reRender()
  }catch(e){toast('File non valido: '+e.message,'err')}}
  r.readAsText(f)
}
