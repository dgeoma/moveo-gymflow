*{-webkit-user-drag:none}
body{background:var(--bg);color:var(--ink);font:14px/1.5 'Como','Quicksand',-apple-system,'Segoe UI',sans-serif;display:flex;height:100vh;overflow:hidden}
button{font-family:inherit}
.sidebar{width:var(--sb);min-width:var(--sb);background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;z-index:60}
.logo{padding:18px 16px 12px;color:var(--accent);display:flex;align-items:center;gap:9px}
.logo .tag{color:var(--ink3);font-size:8.5px;font-weight:600;letter-spacing:.24em;display:block;margin-top:4px}
.role-bar{margin:0 10px 8px;background:var(--card2);border:1px solid var(--border2);border-radius:var(--r);padding:6px 8px}
.role-bar label{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:3px}
.role-bar select{background:transparent;border:none;color:var(--ink);font-size:12px;width:100%;outline:none;cursor:pointer}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 14px;cursor:pointer;border-radius:6px;margin:1px 8px;font-size:13px;color:var(--ink2);transition:background .15s,color .15s}
.nav-item:hover{background:var(--ad);color:var(--ink)}
.nav-item.active{background:var(--ad2);color:var(--accent);font-weight:600}
.nav-item .ico{font-size:14px;width:16px;text-align:center}
.nav-item .badge{margin-left:auto}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:48px;min-height:48px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px}
.hamb{display:none;background:none;border:none;color:var(--ink);font-size:20px;cursor:pointer;padding:4px 8px}
.topbar h1{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-spacer{flex:1}
.gsearch{position:relative}
.gsearch input{background:var(--card2);border:1px solid var(--border2);border-radius:20px;padding:6px 12px 6px 30px;color:var(--ink);font-size:13px;outline:none;width:210px}
.gsearch input:focus{border-color:var(--accent)}
.gsearch .gi{position:absolute;left:10px;top:6px;color:var(--ink3);font-size:13px}
.gs-drop{position:absolute;top:36px;right:0;width:290px;background:var(--card);border:1px solid var(--border2);border-radius:10px;box-shadow:var(--shadow);z-index:120;display:none;max-height:320px;overflow-y:auto}
.gs-drop.open{display:block}
.gs-row{padding:9px 12px;border-bottom:1px solid var(--border);cursor:pointer;font-size:13px}
.gs-row:hover{background:var(--ad)}
.gs-row small{color:var(--ink3);display:block;font-size:11px}
.iconbtn{position:relative;background:none;border:1px solid var(--border2);border-radius:9px;color:var(--ink2);font-size:15px;padding:5px 9px;cursor:pointer}
.iconbtn:hover{border-color:var(--accent);color:var(--accent)}
.iconbtn .dot{position:absolute;top:-4px;right:-4px;background:var(--danger);color:#fff;border-radius:10px;font-size:9px;font-weight:700;min-width:15px;height:15px;display:flex;align-items:center;justify-content:center;padding:0 3px}
.ndrop{position:absolute;top:44px;right:10px;width:330px;max-width:92vw;background:var(--card);border:1px solid var(--border2);border-radius:12px;box-shadow:var(--shadow);z-index:130;display:none;max-height:400px;overflow-y:auto}
.ndrop.open{display:block}
.ndrop .nh{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px;color:var(--ink3)}
.nrow{display:flex;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);font-size:12.5px;cursor:pointer}
.nrow:hover{background:var(--ad)}
.nrow.unread{border-left:3px solid var(--accent)}
.nrow .nt{font-weight:600}
.nrow .nb{color:var(--ink3);font-size:11.5px}
.nrow .ntime{margin-left:auto;color:var(--ink3);font-size:10px;white-space:nowrap}
.uchip{display:flex;align-items:center;gap:7px;background:var(--card2);border:1px solid var(--border2);border-radius:20px;padding:4px 10px 4px 6px;cursor:pointer;font-size:12px}
.uchip:hover{border-color:var(--accent)}
.uchip .uava{width:22px;height:22px;border-radius:50%;background:var(--ad2);display:flex;align-items:center;justify-content:center;font-size:12px;overflow:hidden}
.ava-img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:block}
.acct .aa{overflow:hidden}
.ava-upl{width:84px;height:84px;border-radius:50%;background:var(--ad2);display:flex;align-items:center;justify-content:center;font-size:34px;overflow:hidden;cursor:pointer;border:2px solid var(--border2);position:relative;flex-shrink:0}
.ava-upl:hover{border-color:var(--accent)}
.ava-upl .ov{position:absolute;left:0;right:0;bottom:0;height:26px;background:rgba(0,0,0,.55);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
.ava-upl:hover .ov{opacity:1}
.udrop{position:absolute;top:44px;right:10px;width:230px;background:var(--card);border:1px solid var(--border2);border-radius:12px;box-shadow:var(--shadow);z-index:130;display:none;overflow:hidden}
.udrop.open{display:block}
.udrop .uh{padding:12px 14px;border-bottom:1px solid var(--border)}
.udrop .uh b{display:block;font-size:13px}
.udrop .uh small{color:var(--ink3);font-size:11px}
.udrop .ui{padding:9px 14px;font-size:13px;color:var(--ink2);cursor:pointer;display:flex;gap:8px;align-items:center}
.udrop .ui:hover{background:var(--ad);color:var(--ink)}
.content{flex:1;overflow-y:auto;padding:20px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--card2);border:1px solid var(--border2);border-radius:var(--r);padding:14px 16px}
.kpi .label{font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.kpi .val{font-size:22px;font-weight:700}.kpi .sub{font-size:11px;color:var(--ink2);margin-top:2px}
.tbl-wrap{background:var(--card2);border:1px solid var(--border2);border-radius:var(--r);overflow:hidden}
.tbl-scroll{overflow-x:auto}
.tbl-head{display:flex;align-items:center;padding:10px 14px;gap:10px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.tbl-head input{background:var(--card3);border:1px solid var(--border2);border-radius:6px;padding:6px 10px;color:var(--ink);font-size:13px;outline:none;flex:1;max-width:260px;min-width:140px}
.tbl-head input::placeholder{color:var(--ink3)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:9px 14px;text-align:left;color:var(--ink3);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap}

td{padding:9px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(255,255,255,.02)}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;white-space:nowrap}

.pill-warn{background:rgba(232,160,48,.15);color:var(--warn)}
.pill-danger{background:rgba(232,64,64,.15);color:var(--danger)}

.pill-muted{background:var(--card3);color:var(--ink3)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);border:none;cursor:pointer;font-size:13px;font-weight:500;transition:opacity .15s}
.btn-accent{background:var(--accent);color:var(--on-accent)}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--ink2)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:var(--danger);color:#fff}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.5;cursor:default}
.btn-sm{padding:4px 10px;font-size:12px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;flex-wrap:wrap}
.sec-head h2{font-size:15px;font-weight:600}
.sub-head{font-size:12px;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin:20px 0 10px}
.selin{background:var(--card2);border:1px solid var(--border2);border-radius:6px;padding:6px 10px;color:var(--ink);font-size:13px;outline:none}
/* Gantt orizzontale */
.cal-wrap{background:var(--card2);border:1px solid var(--border2);border-radius:var(--r);display:flex;flex-direction:column;height:calc(100vh - 214px);min-height:300px;overflow:hidden}
.cal-body{flex:1;display:flex;flex-direction:column;overflow-y:auto}
.cal-header{display:flex;border-bottom:1px solid var(--border);background:var(--card2);z-index:10;flex-shrink:0}
.cal-lbl-ph{width:140px;min-width:140px;padding:7px 10px;font-size:10px;color:var(--ink3);border-right:1px solid var(--border)}
.cal-slot-h{flex:1;min-width:0;padding:5px 2px;font-size:10px;color:var(--ink3);text-align:center;border-left:1px solid var(--border);overflow:hidden;white-space:nowrap}
.cal-body{min-width:max-content}
.cal-row{display:flex;border-bottom:1px solid var(--border);flex:1 1 0;min-height:38px}
.cal-row:last-child{border-bottom:none}
.cal-row-lbl{width:140px;min-width:140px;padding:8px 10px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:6px;background:var(--card2);border-right:1px solid var(--border);flex-shrink:0;position:sticky;left:0;z-index:3}
.cal-slots{position:relative;display:flex;flex:1;min-width:0}
.cal-slot{flex:1;min-width:0;border-left:1px solid var(--slotline);cursor:pointer}
.cal-slot:nth-child(odd){border-left:1px solid var(--slotline2)}
.cal-slot:nth-child(even){background:var(--slotalt)}
.cal-row:hover{background:rgba(255,255,255,.015)}
.cal-slot:hover{background:var(--ad)}
.msel{position:relative;display:inline-block}
.msel-pop{position:absolute;top:calc(100% + 6px);left:0;background:var(--card);border:1px solid var(--border2);border-radius:10px;box-shadow:var(--shadow);z-index:70;min-width:230px;max-height:300px;overflow-y:auto;padding:6px}
.msel-top{display:flex;justify-content:space-between;gap:10px;padding:5px 8px;border-bottom:1px solid var(--border);margin-bottom:4px}
.msel-top span{font-size:11px;color:var(--accent);cursor:pointer;font-weight:600}
.msel-it{display:flex;align-items:center;gap:8px;padding:5px 8px;font-size:12.5px;border-radius:6px;cursor:pointer}
.msel-it:hover{background:var(--ad)}
.msel-it small{color:var(--ink3);font-size:10px}
.msel-it input{accent-color:var(--accent)}
.cal-slot.navail{background:rgba(207,106,88,.12)!important;cursor:not-allowed}
.cal-slot.navail:hover{background:rgba(207,106,88,.12)!important}
body.light .cal-slot.navail,body.light .cal-slot.navail:hover{background:rgba(191,84,66,.13)!important}
.cal-event{position:absolute;top:4px;bottom:4px;border-radius:6px;padding:3px 7px;font-size:11px;font-weight:600;overflow:hidden;cursor:pointer;z-index:2}
.cal-event.done{opacity:.45}
.cal-block{position:absolute;top:4px;bottom:4px;border-radius:6px;background:repeating-linear-gradient(45deg,#222,#222 6px,#1a1a1a 6px,#1a1a1a 12px);border:1px dashed var(--border3);color:var(--ink3);font-size:10px;display:flex;align-items:center;justify-content:center;z-index:1;cursor:pointer}
/* Griglia settimana */
.wk-wrap{background:var(--card2);border:1px solid var(--border2);border-radius:var(--r);overflow:auto;max-height:calc(100vh - 150px)}
.wk-head{display:flex;position:sticky;top:0;background:var(--card2);z-index:6;border-bottom:1px solid var(--border);min-width:640px}
.wk-corner{width:56px;min-width:56px;border-right:1px solid var(--border)}
.wk-dayhead{flex:1;min-width:84px;text-align:center;padding:9px 0;font-size:12px;font-weight:600;border-left:1px solid var(--border)}
.wk-dayhead small{display:block;font-size:10px;color:var(--ink3);font-weight:400}
.wk-dayhead.today{color:var(--accent)}
.wk-body{display:flex;min-width:640px}
.wk-times{width:56px;min-width:56px;border-right:1px solid var(--border)}
.wk-time{font-size:10px;color:var(--ink3);text-align:right;padding:2px 6px 0 0;border-bottom:1px solid var(--border)}
.wk-grid{display:flex;flex:1}
.wk-day{flex:1;min-width:84px;position:relative;border-left:1px solid var(--border)}
.wk-cell{border-bottom:1px solid var(--border);cursor:pointer}
.wk-cell:hover{background:var(--ad)}
.wk-event{position:absolute;left:2px;right:2px;border-radius:5px;padding:3px 5px;font-size:11px;overflow:hidden;cursor:pointer;z-index:2;line-height:1.25}
.wk-event.done{opacity:.45}
.wk-block{position:absolute;left:2px;right:2px;border-radius:5px;background:repeating-linear-gradient(45deg,#222,#222 6px,#1a1a1a 6px,#1a1a1a 12px);border:1px dashed var(--border3);color:var(--ink3);font-size:10px;display:flex;align-items:center;justify-content:center;z-index:1;cursor:pointer}
/* charts */
.chart-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-top:14px}
.chart-card{background:var(--card2);border:1px solid var(--border2);border-radius:var(--r);padding:14px}
.chart-card h3{font-size:12px;font-weight:600;margin-bottom:10px;color:var(--ink2)}
canvas{width:100%;height:120px;display:block}
.tog-row{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.tog{padding:4px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--ink3);font-size:12px;cursor:pointer}
.tog.on{background:var(--accent);color:var(--on-accent);border-color:var(--accent)}
/* shop */
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.shop-item{background:var(--card2);border:1px solid var(--border2);border-radius:var(--r);padding:12px;cursor:pointer;transition:border-color .15s}
.shop-item:hover{border-color:var(--accent)}
.shop-item .iname{font-size:13px;font-weight:500;margin-bottom:3px}
.shop-item .iprice{font-size:15px;font-weight:700;color:var(--accent)}
.shop-item .icat{font-size:11px;color:var(--ink3)}
.cart-panel{background:var(--card2);border:1px solid var(--border2);border-radius:var(--r);padding:14px;margin-top:14px}
.cart-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px;gap:8px}
/* misc panels */
.equip-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:12px}
.equip-card{background:var(--card2);border:1px solid var(--border2);border-radius:var(--r);padding:14px}
.equip-card h3{font-size:13px;font-weight:600;margin-bottom:8px}
.equip-card .meta{font-size:12px;color:var(--ink3);line-height:1.9}
.msg-list{background:var(--card2);border:1px solid var(--border2);border-radius:var(--r);overflow:hidden}
.msg-row{display:flex;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.msg-row:hover{background:var(--ad)}
.msg-row.unread{border-left:3px solid var(--accent)}
.msg-from{font-weight:600;font-size:13px;width:130px;flex-shrink:0}
.msg-sub{flex:1;font-size:13px;min-width:0}
.msg-preview{color:var(--ink3);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.msg-date{font-size:11px;color:var(--ink3);white-space:nowrap}
.gcal-card{background:var(--card2);border:1px solid var(--border2);border-radius:var(--r);padding:20px;display:flex;align-items:flex-start;gap:16px;max-width:500px}
.gcal-ico{font-size:30px;line-height:1}
.slot-day{margin-bottom:12px}
.slot-day .dl{font-size:11px;color:var(--ink3);margin-bottom:5px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.hero{background:linear-gradient(135deg,var(--ad2),transparent),var(--card2);border:1px solid var(--border2);border-left:3px solid var(--accent);border-radius:var(--r);padding:16px 18px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap}
.hero .lbl{font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.hero .big{font-size:18px;font-weight:700}
.hero .meta{font-size:13px;color:var(--ink2);margin-top:2px}
.panel{background:var(--card2);border:1px solid var(--border2);border-radius:var(--r);padding:16px}
.panel h3{font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.pbar{height:7px;background:var(--card3);border-radius:4px;overflow:hidden;margin-top:8px}
.pbar>i{display:block;height:100%;background:var(--accent);border-radius:4px}
.meal-row{display:flex;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.meal-row:last-child{border-bottom:none}
.meal-row .mn{font-weight:600;font-size:12px;color:var(--ink2)}
.meal-row .mi{color:var(--ink3);font-size:12px;flex:1;padding:0 10px}
.ex-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;gap:8px}
.ex-row:last-child{border-bottom:none}
.ex-row .sr{color:var(--accent);font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap}
.rest-card{text-align:center;padding:24px}
.rest-card .em{font-size:44px}
.book-card{background:var(--card2);border:1px solid var(--border2);border-radius:var(--r);padding:13px 15px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.book-card .bl{font-weight:600}.book-card .bm{font-size:12px;color:var(--ink3);margin-top:2px}
/* checkout */
.co-line{display:flex;justify-content:space-between;padding:6px 0;font-size:13px}
.co-tot{display:flex;justify-content:space-between;padding:10px 0 0;margin-top:6px;border-top:1px solid var(--border);font-weight:700;font-size:16px}
.co-card{display:flex;align-items:center;gap:12px;background:var(--card2);border:1px solid var(--accent);border-radius:var(--r);padding:12px;margin:12px 0}
.co-card .cc-ic{width:40px;height:26px;border-radius:4px;background:linear-gradient(135deg,#2a2a2a,#3a3a3a);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--accent)}
.co-card .cc-n{font-size:13px}.co-card .cc-s{font-size:11px;color:var(--ink3)}
.pay-ok{text-align:center;padding:14px 0}
.pay-ok .em{font-size:40px;color:var(--ok)}
/* diario alimentare */
.diary-row{display:flex;gap:10px;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.diary-row .mn{font-weight:600;font-size:13px}
.diary-row .mi{font-size:12px;color:var(--ink3);overflow:hidden;text-overflow:ellipsis}
.mbtns{display:flex;gap:5px;flex-shrink:0}
.mbtn{border:1px solid var(--border2);background:var(--card);color:var(--ink2);border-radius:16px;padding:5px 9px;font-size:11px;cursor:pointer;white-space:nowrap}
.mbtn.on{background:var(--accent);border-color:var(--accent);color:var(--on-accent);font-weight:600}
.diary-water{display:flex;justify-content:space-between;align-items:center;padding:12px 0 2px;border-top:1px solid var(--border);margin-top:6px;font-size:13px}
/* to-do allenamento */
.todo-row{display:flex;gap:12px;align-items:center;padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer}
.todo-row .cbx{width:24px;height:24px;border-radius:7px;border:2px solid var(--border3);display:flex;align-items:center;justify-content:center;color:var(--on-accent);font-weight:800;flex-shrink:0}
.todo-row.done .cbx{background:var(--accent);border-color:var(--accent)}
.todo-row .tx{font-weight:600;font-size:14px}
.todo-row.done .tx{text-decoration:line-through;color:var(--ink3)}
.todo-row .ts{font-size:12px;color:var(--ink3)}
/* assistente allenamento */
#assistScreen{position:fixed;inset:0;z-index:150;background:var(--bg);display:flex;flex-direction:column}
.as-top{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border);background:var(--card)}
.as-chrono{font-weight:700;font-variant-numeric:tabular-nums;color:var(--accent);white-space:nowrap}
.as-body{flex:1;overflow-y:auto;padding:16px;max-width:680px;margin:0 auto;width:100%}
.as-ex{background:var(--card2);border:1px solid var(--border2);border-radius:var(--r);padding:14px;margin-bottom:12px}
.as-ex.done{border-color:var(--accent-dim2)}
.as-exh{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px}
.as-ex .tx{font-weight:700}.as-ex .ts{font-size:12px;color:var(--ink3);margin-top:2px}
.set-chips{display:flex;gap:8px;flex-wrap:wrap}
.set-chip{width:42px;height:42px;border-radius:10px;border:2px solid var(--border2);background:var(--card);display:flex;align-items:center;justify-content:center;font-weight:700;cursor:pointer;transition:all .12s}
.set-chip.on{background:var(--accent);border-color:var(--accent);color:var(--on-accent)}
.as-foot{padding:14px 16px;border-top:1px solid var(--border);background:var(--card);width:100%}
.as-rest{position:fixed;left:16px;right:16px;bottom:78px;max-width:648px;margin:0 auto;background:var(--card);border:1px solid var(--accent);border-radius:12px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--shadow);z-index:151}
.stava{display:inline-flex;border-radius:50%;overflow:hidden;vertical-align:middle;background:var(--ad2);align-items:center;justify-content:center;flex-shrink:0}
.feat{list-style:none;margin:0;padding:0}
.feat li{position:relative;padding:4px 0 4px 22px;font-size:12.5px;color:var(--ink2);line-height:1.45}
.feat li::before{content:'✓';position:absolute;left:2px;color:var(--accent);font-weight:800}
.feat li b{color:var(--ink)}
/* checkbox scontrino grande */
.bigchk{display:flex;align-items:center;gap:12px;background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:13px 14px;margin-bottom:12px;cursor:pointer;font-size:14.5px;font-weight:600}
.bigchk input{width:24px;height:24px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
/* combo ricerca */
.combo{position:relative}
.combo-in{width:100%;background:var(--card);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;color:var(--ink);font:inherit;font-size:13px;outline:none}
.combo-in:focus{border-color:var(--accent)}
.combo-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--card);border:1px solid var(--border2);border-radius:10px;box-shadow:var(--shadow);z-index:60;max-height:230px;overflow-y:auto}
.combo-it{display:flex;justify-content:space-between;gap:10px;padding:9px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border)}
.combo-it:last-child{border-bottom:none}
.combo-it:hover{background:var(--ad)}
/* menu riga */
.rowmenu{position:fixed;z-index:120;background:var(--card);border:1px solid var(--border2);border-radius:10px;box-shadow:var(--shadow);min-width:180px;overflow:hidden}
.rowmenu .ui{padding:10px 14px;font-size:13px;cursor:pointer}
.rowmenu .ui:hover{background:var(--ad)}
/* slot occupato su gcal */
.slot-busy{border-color:var(--warn)!important;color:var(--warn)!important}
/* chips selector */
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:8px 14px;border-radius:20px;border:1px solid var(--border2);background:var(--card);color:var(--ink2);font-size:13px;cursor:pointer;user-select:none;transition:all .13s}
.chip:hover{border-color:var(--ink3);color:var(--ink)}
.chip.sel{background:var(--accent);border-color:var(--accent);color:var(--on-accent);font-weight:600}
/* impostazioni */
.set-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.set-tab{padding:7px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--ink2);font-size:13px;cursor:pointer}
.set-tab.on{background:var(--accent);color:var(--on-accent);border-color:var(--accent);font-weight:600}
.set-row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);font-size:13px}
.set-row:last-child{border-bottom:none}
.set-row .sl{flex:1}.set-row .sl small{display:block;color:var(--ink3);font-size:11.5px}
.switch{position:relative;width:38px;height:21px;background:var(--card3);border:1px solid var(--border2);border-radius:20px;cursor:pointer;flex-shrink:0;transition:background .15s}
.switch.on{background:var(--accent);border-color:var(--accent)}
.switch::after{content:'';position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:50%;background:var(--ink2);transition:left .15s,background .15s}
.switch.on::after{left:19px;background:var(--on-accent)}
.audit-row{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.audit-row .at{color:var(--ink3);white-space:nowrap;font-variant-numeric:tabular-nums}
.audit-row .au{color:var(--accent);white-space:nowrap}
/* clinica */
.clin-card{background:var(--card2);border:1px solid var(--border2);border-left:3px solid #22d3ee;border-radius:var(--r);padding:13px 15px;margin-bottom:10px}
.clin-card .ch{display:flex;justify-content:space-between;gap:8px;font-size:12px;color:var(--ink3);margin-bottom:5px}
.lock-note{background:rgba(34,211,238,.06);border:1px dashed rgba(34,211,238,.35);border-radius:var(--r);padding:14px;font-size:12.5px;color:var(--ink2)}
/* toast */
#toasts{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:300;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
.toast{background:#181818;border:1px solid var(--border3);border-left:3px solid var(--accent);color:var(--ink);border-radius:10px;padding:10px 16px;font-size:13px;box-shadow:var(--shadow);animation:tin .25s ease;max-width:90vw}
.toast.warn{border-left-color:var(--warn)}.toast.err{border-left-color:var(--danger)}
@keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
/* watermark + stamp + gate + login */
.wm{position:fixed;inset:0;pointer-events:none;z-index:40;opacity:.05;

.stamp{position:fixed;bottom:8px;right:10px;z-index:50;font-size:10px;color:var(--ink3);background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:3px 10px;pointer-events:none;opacity:.92}
.gate{position:fixed;inset:0;z-index:200;background:radial-gradient(1200px 600px at 50% -10%,var(--ad),transparent),var(--bg);display:flex;align-items:center;justify-content:center;overflow-y:auto}
.gate.hide{display:none}
.gate-box{width:360px;max-width:92%;text-align:center;padding:20px 0}
.gate-box .gl{display:flex;flex-direction:column;align-items:center;gap:10px;color:var(--accent);margin-bottom:6px}
.gate-box .gtag{font-size:10px;letter-spacing:.34em;color:var(--ink3);font-weight:600}
.gate-box .gs{font-size:12px;color:var(--ink2);margin:2px 0 22px}
.gate-box .gt{font-size:12px;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.gate-box input{width:100%;background:var(--card2);border:1px solid var(--border2);border-radius:var(--r);padding:11px 14px;color:var(--ink);font-size:15px;text-align:center;letter-spacing:2px;outline:none}
.gate-box input:focus{border-color:var(--accent)}
.gate-box .gerr{color:var(--danger);font-size:12px;min-height:16px;margin-top:8px}
.gate-box .gf{font-size:11px;color:var(--ink3);margin-top:20px;line-height:1.7}
.remember{display:flex;align-items:center;justify-content:center;gap:7px;font-size:12px;color:var(--ink2);margin-top:12px;cursor:pointer;user-select:none}
.remember input{width:auto;accent-color:var(--accent)}
.acct{display:flex;align-items:center;gap:10px;background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:9px 12px;margin-bottom:7px;cursor:pointer;text-align:left;transition:border-color .12s}
.acct:hover{border-color:var(--accent)}
.acct.sel{border-color:var(--accent);background:var(--ad)}
.acct .aa{width:30px;height:30px;border-radius:50%;background:var(--ad2);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.acct .an{font-size:13px;font-weight:600}
.acct .ar{font-size:11px;color:var(--ink3)}
/* modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:none;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:22px;min-width:340px;max-width:500px;width:92%;max-height:84vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal h2{font-size:15px;font-weight:600;margin-bottom:14px}
.form-row{margin-bottom:11px}
.form-row label{display:block;font-size:11px;color:var(--ink3);margin-bottom:3px}
.form-row input,.form-row select,.form-row textarea{width:100%;background:var(--card2);border:1px solid var(--border2);border-radius:6px;padding:7px 10px;color:var(--ink);font-size:13px;outline:none;font-family:inherit}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--accent)}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;flex-wrap:wrap}
/* print ricevuta */
#printArea{display:none}
@media print{
  body>*{display:none!important}
  #printArea{display:block!important;position:absolute;inset:0;background:#fff;color:#000;padding:30px;font:13px/1.6 'Courier New',monospace}
}
/* mobile */
@media(max-width:860px){
  .sidebar{position:fixed;left:calc(-1 * var(--sb) - 10px);top:0;bottom:0;transition:left .2s ease;box-shadow:var(--shadow)}

  .hamb{display:block}
  .gsearch input{width:120px}
  .content{padding:12px}
  .grid2{grid-template-columns:1fr}
  .cards{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
  .ndrop,.udrop{right:4px}
  body.has-bottom #bottomNav{display:flex}

#bottomNav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border2);z-index:80;padding:6px 4px calc(8px + env(safe-area-inset-bottom))}

window.TSORT={}
function setSort(v,k,fn){const st=window.TSORT[v]||{};if(st.k===k)st.asc=!st.asc;else{st.k=k;st.asc=true}
  window.TSORT[v]=st;if(window[fn])window[fn]()}
function ths(v,k,l,fn){const st=window.TSORT[v]||{};const ar=st.k===k?(st.asc?' ↑':' ↓'):''
  return `<th onclick="setSort('${v}','${k}','${fn}')" style="cursor:pointer">${l}${ar}</th>`}
function tsorted(v,list){const st=window.TSORT[v];if(!st||!st.k)return list
  return [...list].sort((a,b)=>{const va=a[st.k],vb=b[st.k]
    if(va==null&&vb==null)return 0;if(va==null)return 1;if(vb==null)return -1
    const r=(typeof va==='number'&&typeof vb==='number')?va-vb:String(va).localeCompare(String(vb),'it',{numeric:true})
    return st.asc?r:-r})}
function ledgerAge(l){const d=(l.date||'').toLowerCase()
  if(d==='oggi'||d==='adesso')return 0
  const m=d.match(/(\d+)\s+(\w+)/);if(!m)return 999
  const MO={gen:0,feb:1,mar:2,apr:3,mag:4,giu:5,lug:6,ago:7,set:8,ott:9,nov:10,dic:11}
  const mon=MO[m[2].slice(0,3)];if(mon==null)return 999
  const now=new Date();let diff=Math.round((now-new Date(now.getFullYear(),mon,+m[1]))/86400000)
  if(diff<-180)diff+=365;return Math.max(0,diff)}

let CRM_SEL=new Set()
function crmToggle(id,on){if(on)CRM_SEL.add(id);else CRM_SEL.delete(id);renderClients()}
function crmToggleAll(list,on){list.forEach(id=>{if(on)CRM_SEL.add(id);else CRM_SEL.delete(id)});renderClients()}
function bulkSetStatus(st){
  const items=[...CRM_SEL].map(id=>CLIENTS.find(c=>c.id===id)).filter(Boolean)
  const snap=items.map(c=>({id:c.id,prev:c.status}))
  items.forEach(c=>c.status=st)
  BULK_LOG.unshift({id:'bl'+Date.now(),when:nowStr(),by:CURRENT_USER.name,action:st==='sospeso'?'Sospensione clienti':'Attivazione clienti',n:items.length,items:items.map(c=>c.name),kind:'status',snap})
  audit(`AZIONE IN BLOCCO: ${st==='sospeso'?'sospesi':'attivati'} ${items.length} clienti (${items.map(c=>c.name).join(', ')})`)
  toast(`${items.length} clienti ${st==='sospeso'?'sospesi':'attivati'}`);CRM_SEL.clear();saveState();renderClients()
}
function askBulkDelete(){
  const items=[...CRM_SEL].map(id=>CLIENTS.find(c=>c.id===id)).filter(Boolean)
  const blocked=items.filter(c=>SESSIONS.some(e=>e.status==='prog'&&(e.clientId===c.id||(e.roster&&e.roster.includes(c.name)))))
  const deletable=items.filter(c=>!blocked.includes(c))
  showModal(`<h2>Eliminare ${items.length} clienti?</h2>
    <div style="background:var(--card2);border:1px solid var(--border2);border-radius:var(--r);padding:12px;font-size:13px;margin-bottom:10px;max-height:160px;overflow-y:auto">
      ${deletable.map(c=>`<div>🗑 ${esc(c.name)}</div>`).join('')}
      ${blocked.map(c=>`<div style="color:var(--warn)">⏭ ${esc(c.name)} — saltato (sessioni in programma)</div>`).join('')}</div>
    <div style="font-size:12px;color:var(--ink3);margin-bottom:8px">L’azione viene registrata in «Azioni in blocco» e resta <b>ripristinabile</b>.</div>
    <div class="modal-foot"><button class="btn btn-accent" onclick="closeModal()">No, non eliminare</button>
      <button class="btn btn-outline" style="color:var(--danger);border-color:var(--danger)" ${deletable.length?'':'disabled'} onclick="doBulkDelete()">Elimina ${deletable.length}</button></div>`)
}
function doBulkDelete(){
  const items=[...CRM_SEL].map(id=>CLIENTS.find(c=>c.id===id)).filter(Boolean)
    .filter(c=>!SESSIONS.some(e=>e.status==='prog'&&(e.clientId===c.id||(e.roster&&e.roster.includes(c.name)))))
  const snap=items.map(c=>JSON.parse(JSON.stringify(c)))
  items.forEach(c=>{const i=CLIENTS.findIndex(x=>x.id===c.id);if(i>-1)CLIENTS.splice(i,1)})
  BULK_LOG.unshift({id:'bl'+Date.now(),when:nowStr(),by:CURRENT_USER.name,action:'Eliminazione clienti',n:items.length,items:items.map(c=>c.name),kind:'delete',snap})
  audit(`AZIONE IN BLOCCO: eliminati ${items.length} clienti (${items.map(c=>c.name).join(', ')})`)
  toast(`${items.length} clienti eliminati — ripristinabile da Impostazioni → Azioni in blocco`,'warn')
  CRM_SEL.clear();closeModal();saveState();renderClients()
}
function bulkRestore(id){
  const l=BULK_LOG.find(x=>x.id===id);if(!l||l.restored)return
  if(l.kind==='delete'){l.snap.forEach(c=>{if(!CLIENTS.find(x=>x.id===c.id))CLIENTS.push(c)})}
  else if(l.kind==='status'){l.snap.forEach(sn=>{const c=CLIENTS.find(x=>x.id===sn.id);if(c)c.status=sn.prev})}
  l.restored=true
  audit(`RIPRISTINO azione in blocco: ${l.action} (${l.n} elementi) — annullata da ${CURRENT_USER.name}`)
  toast('Azione ripristinata ✓');saveState();buildImpostazioni()
}

function ledger(c,type,qty,desc){LEDGER.unshift({client:c.id,date:'oggi',type,qty,desc,by:(typeof CURRENT_USER!=='undefined'&&CURRENT_USER)?CURRENT_USER.name:'Sistema'})}
function spendTok(c,n,desc){const w=walletOf(c);w.tok=+(w.tok-n).toFixed(1);ledger(c,'spesa',-n,desc)}
function creditTok(c,n,desc){const w=walletOf(c);w.tok=+(w.tok+n).toFixed(1);ledger(c,'accredito',n,desc)}
function chargeFor(c,svc,desc){
  const w=walletOf(c)
  const pk=(w.packs||[]).find(p=>p.svc===svc.id&&p.left>0)
  if(pk){pk.left--;ledger(c,'pacchetto',0,`${desc} — 1 lezione dal pacchetto «${pk.label}» (${pk.left}/${pk.tot} rimaste)`);return {pack:pk}}
  spendTok(c,svc.tok,desc);return {tok:svc.tok}
}
function activePacks(c){const w=walletOf(c);return (w.packs||[]).filter(p=>p.left>0)}
function rateStatus(c){const w=walletOf(c);const r=w.ratePlan;if(!r)return null
  const paidQuota=Math.round(r.tokTot*r.ratePaid/r.rateTot)
  const usedReal=+(r.tokTot-Math.max(0,Math.min(w.tok,r.tokTot))).toFixed(1)
  const over=+(usedReal-paidQuota).toFixed(1)
  return {...r,paidQuota,used:usedReal,over:over>0?over:0}
}
function nextReceipt(){let mx=100;PAYMENTS.forEach(p=>{const m=/R-2026-(\d+)/.exec(p.num||'');if(m)mx=Math.max(mx,+m[1])});return 'R-2026-'+String(mx+1).padStart(4,'0')}
function addPayment(client,desc,line,amount,method,vat,status){const num=nextReceipt();PAYMENTS.unshift({id:'p'+Date.now(),num,date:todayISO(),client,desc,line,amount:+(+amount).toFixed(2),method,vat,status:status||'pagato'});audit(`Incasso ${num} — ${client} €${(+amount).toFixed(2)} (${method})`);return num}

/* ═══════════ MOTORE CONFLITTI ═══════════ */
function overlaps(aS,aD,bS,bD){return aS<bS+bD && bS<aS+aD}
function qualified(staffId,svcId){const st=staffOf(staffId),svc=svcOf(svcId);if(!svc||!svc.req||!svc.req.length)return true;return svc.req.some(r=>st.roles.includes(r))}
function conflictsFor(staffId,day,start,dur,exclId){
  const st=staffOf(staffId);if(!st)return ['Trainer non trovato']
  const errs=[],av=st.avail[DAYS[day]]
  if(!av)errs.push(`${st.name.split(' ')[0]} non lavora di ${DAYS[day]}`)
  else if(start<av[0]||start+dur>av[1]+.001)errs.push(`Fuori dall’orario di ${st.name.split(' ')[0]} (${av[0]}:00–${av[1]}:00)`)
  ;(st.blocks||[]).forEach(b=>{if(b.day===day&&overlaps(start,dur,b.start,b.dur))errs.push(`Blocco personale «${b.label}» ${fmt(b.start)}–${fmt(b.start+b.dur)}`)})
  SESSIONS.forEach(e=>{if(e.staff===staffId&&e.day===day&&e.id!==exclId&&overlaps(start,dur,e.start,e.dur))errs.push(`${st.name.split(' ')[0]} è già occupato ${fmt(e.start)}–${fmt(e.start+e.dur)} (${svcOf(e.svc)?.name})`)})
  return errs
}
function equipConflict(svcId,day,start,dur,exclId){
  const svc=svcOf(svcId);if(!svc||!svc.equip)return null
  const eq=EQUIPMENT.find(e=>e.id===svc.equip)
  const busy=SESSIONS.filter(e=>{const s2=svcOf(e.svc);return s2&&s2.equip===svc.equip&&e.day===day&&e.id!==exclId&&overlaps(start,dur,e.start,e.dur)}).length
  return busy>=eq.max_c?`${eq.name}: già ${busy}/${eq.max_c} in uso in questa fascia`:null
}
function clientBusy(c,day,start,dur,exclId){
  const errs=[]
  SESSIONS.forEach(e=>{if(e.day!==day||e.id===exclId||e.status!=='prog')return
    if((e.clientId===c.id||(e.roster&&e.roster.includes(c.name)))&&overlaps(start,dur,e.start,e.dur))errs.push(`${c.name} ha già ${svcOf(e.svc)?svcOf(e.svc).name:'una sessione'} alle ${fmt(e.start)}`)})
  return errs
}
function allChecks(staffId,svcId,day,start,dur,exclId){
  const errs=[]
  if(!qualified(staffId,svcId))errs.push(`${staffOf(staffId).name.split(' ')[0]} non è abilitato a «${svcOf(svcId).name}» (richiede: ${svcOf(svcId).req.join('/')})`)
  const ds=staffOf(staffId).dayServices
  if(ds&&ds[DAYS[day]]&&!ds[DAYS[day]].includes(svcId))errs.push(`${staffOf(staffId).name.split(' ')[0]} il ${DAYS[day]} fa solo: ${ds[DAYS[day]].map(x=>svcOf(x)?svcOf(x).name:x).join(', ')}`)
  const _av=staffOf(staffId).avail?staffOf(staffId).avail[DAYS[day]]:null
  if(!_av)errs.push(`${staffOf(staffId).name.split(' ')[0]} non è disponibile il ${DAYS[day]}`)
  else if(start<_av[0]||start+dur>_av[1])errs.push(`${staffOf(staffId).name.split(' ')[0]} il ${DAYS[day]} è disponibile solo dalle ${_av[0]} alle ${_av[1]}`)
  errs.push(...conflictsFor(staffId,day,start,dur,exclId))
  const eqE=equipConflict(svcId,day,start,dur,exclId);if(eqE)errs.push(eqE)
  return errs
}

  CURRENT_USER=u;ROLE=u.role
  if(u.staffId)CURRENT_TRAINER=u.staffId

  try{sessionStorage.setItem('gf_user',u.id)}catch(e){}

  document.getElementById('uName').textContent=u.name.split(' ')[0]

/* ═══════════ CALENDARIO — Gantt (admin/reception) ═══════════ */
function buildCal(){
  const nSlots=(CAL_E-CAL_S)*2
  let slotHdrs=''
  for(let i=0;i<nSlots;i++){const h=CAL_S+Math.floor(i/2);slotHdrs+=`<div class="cal-slot-h" style="${i%2===0?'font-weight:600;color:var(--ink)':''}">${i%2===0?h+':00':''}</div>`}
  let rows=''
  calStaffList().forEach(st=>{
    const av=st.avail?st.avail[DAYS[calDay]]:null
    let slots='';for(let i=0;i<nSlots;i++){const hh=CAL_S+i/2
      const free=av&&hh>=av[0]&&hh+0.5<=av[1]
      slots+=free?`<div class="cal-slot" onclick="openNewEvt('${st.id}',${CAL_S}+${i}/2,${calDay})"></div>`
        :`<div class="cal-slot navail" title="${esc(st.name.split(' ')[0])} non disponibile${av?` (${DAYS[calDay]}: ${av[0]}–${av[1]})`:' il '+DAYS[calDay]}"></div>`}
    let evts=''
    ;(st.blocks||[]).filter(b=>b.day===calDay).forEach(b=>{
      evts+=`<div class="cal-block" style="left:${(b.start-CAL_S)/(CAL_E-CAL_S)*100}%;width:calc(${b.dur/(CAL_E-CAL_S)*100}% - 4px)" title="${esc(b.label)}">🚫 ${esc(b.label)}</div>`})
    SESSIONS.filter(e=>e.staff===st.id&&e.day===calDay).forEach(e=>{
      const svc=svcOf(e.svc), l=((e.start-CAL_S)/(CAL_E-CAL_S)*100)+'%', w=`calc(${e.dur/(CAL_E-CAL_S)*100}% - 4px)`
      const done=e.status!=='prog'
      const who=e.roster?`${e.roster.length}/${svc.max} iscritti`:esc(e.client)
      evts+=`<div class="cal-event ${done?'done':''}" style="left:${l};width:${w};background:${svc.color}2e;border-left:3px solid ${svc.color};color:${svc.color}${dimSvc(e)}" onclick="openEvt('${e.id}')">
        <div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.status==='noshow'?'✗ ':''}${esc(svc.name)}</div>
        <div style="font-weight:400;opacity:.75;font-size:10px">${who}</div></div>`
    })
    rows+=`<div class="cal-row"><div class="cal-row-lbl">${stAvaHtml(st,24)}<span title="${st.avail&&st.avail[DAYS[calDay]]?'Disponibile '+st.avail[DAYS[calDay]][0]+'–'+st.avail[DAYS[calDay]][1]:'Non disponibile '+DAYS[calDay]}">${esc(st.name.split(' ')[0])}<small style="display:block;color:var(--ink3);font-size:9.5px">${st.avail&&st.avail[DAYS[calDay]]?st.avail[DAYS[calDay]][0]+'–'+st.avail[DAYS[calDay]][1]:'—'}</small>${CAL_SORT==='top'||CAL_SORT==='low'?`<small style="display:block;color:var(--ink3);font-size:10px">${allSess(st)} sessioni</small>`:''}</span></div>
      <div class="cal-slots">${slots}${evts}</div></div>`
  })
  C().innerHTML=`
  <div class="sec-head"><h2>Calendario — ${DAYS[calDay]} ${calDate(calDay)}${CAL_WOFF===0&&calDay===TODAY_DOW?' (oggi)':''}</h2>
    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
      <button class="btn btn-outline" style="padding:5px 9px" title="Settimana precedente" onclick="CAL_WOFF--;buildCal()">«</button>
      <button class="btn btn-outline" style="padding:5px 9px" title="Giorno precedente" onclick="calDay=(calDay+6)%7;buildCal()">‹</button>
      <button class="btn btn-outline" style="padding:5px 9px" title="Giorno successivo" onclick="calDay=(calDay+1)%7;buildCal()">›</button>
      <button class="btn btn-outline" style="padding:5px 9px" title="Settimana successiva" onclick="CAL_WOFF++;buildCal()">»</button>
      ${CAL_WOFF!==0?`<button class="btn btn-outline btn-sm" onclick="CAL_WOFF=0;calDay=TODAY_DOW;buildCal()">Oggi</button>`:''}
      <button class="btn btn-accent" onclick="openNewEvt(null,null,calDay)">+ Sessione</button></div></div>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px">
    ${mselHtml('svc','Servizi',SVCS,x=>x.name,x=>svcDemand(x.id))}
    ${mselHtml('tr','Trainer',STAFF,x=>x.name,x=>allSess(x))}
    <select class="selin" onchange="CAL_SORT=this.value;buildCal()">
      <option value="">Ordine standard</option>
      <option value="az" ${CAL_SORT==='az'?'selected':''}>A → Z</option>
      <option value="za" ${CAL_SORT==='za'?'selected':''}>Z → A</option>
      <option value="top" ${CAL_SORT==='top'?'selected':''}>Più richiesti</option>
      <option value="low" ${CAL_SORT==='low'?'selected':''}>Meno richiesti</option></select>
    ${CAL_SVCS.size||CAL_TRS.size?`<span class="pill pill-accent">${calStaffList().length} trainer in vista</span><button class="btn btn-outline btn-sm" onclick="CAL_SVCS.clear();CAL_TRS.clear();buildCal()">✕ filtri</button>`:''}
    ${CAL_WOFF!==0?`<span class="pill pill-muted">settimana del ${calDate(0)} — planning ricorrente (demo)</span>`:''}</div>
  <div class="cal-wrap"><div class="cal-header"><div class="cal-lbl-ph">Trainer</div>${slotHdrs}</div><div class="cal-body">${rows}</div></div>`
}

/* ═══════════ CALENDARIO — settimana (trainer) ═══════════ */
function buildMyCal(){
  const st=staffOf(CURRENT_TRAINER), H0=7,H1=21,rowH=52
  let times='';for(let h=H0;h<H1;h++) times+=`<div class="wk-time" style="height:${rowH}px">${h}:00</div>`
  let dayHdrs=DAYS.map((d,i)=>{const a=st.avail[d];return `<div class="wk-dayhead ${i===TODAY_DOW?'today':''}">${d}<small>${a?a[0]+'–'+a[1]:'chiuso'}</small></div>`}).join('')
  let cols=''
  DAYS.forEach((d,di)=>{
    const avd=st.avail?st.avail[d]:null
    let cells='';for(let h=H0;h<H1;h++){const free=avd&&h>=avd[0]&&h+1<=avd[1]
      cells+=free?`<div class="wk-cell" style="height:${rowH}px" onclick="openNewEvt('${CURRENT_TRAINER}',${h},${di})"></div>`
        :`<div class="wk-cell navail" style="height:${rowH}px;background:rgba(207,106,88,.09);cursor:not-allowed" title="Fuori disponibilità"></div>`}
    let evts=''
    ;(st.blocks||[]).filter(b=>b.day===di).forEach((b)=>{
      evts+=`<div class="wk-block" style="top:${(b.start-H0)*rowH}px;height:${b.dur*rowH-3}px" onclick="event.stopPropagation();removeBlock('${st.id}',${b.day},${b.start})">🚫 ${esc(b.label)}</div>`})
    SESSIONS.filter(e=>e.staff===CURRENT_TRAINER&&e.day===di).forEach(e=>{
      const svc=svcOf(e.svc), top=(e.start-H0)*rowH, hgt=e.dur*rowH-3
      const who=e.roster?`${e.roster.length}/${svc.max} iscritti`:esc(e.client)
      evts+=`<div class="wk-event ${e.status!=='prog'?'done':''}" style="top:${top}px;height:${hgt}px;background:${svc.color}22;border-left:3px solid ${svc.color};color:${svc.color}" onclick="event.stopPropagation();openEvt('${e.id}')">
        <div style="font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.status==='noshow'?'✗ ':''}${esc(svc.name)}</div>
        <div style="opacity:.75;font-weight:400;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${who}</div></div>`
    })
    cols+=`<div class="wk-day">${cells}${evts}</div>`
  })
  C().innerHTML=`
  <div class="sec-head"><h2>${st.ava} Il mio calendario — settimana 6–12 lug</h2>
    <div style="display:flex;gap:8px"><button class="btn btn-outline" onclick="openNewEvt('${CURRENT_TRAINER}',null,null,true)">+ Blocco</button>
    <button class="btn btn-accent" onclick="openNewEvt('${CURRENT_TRAINER}')">+ Sessione</button></div></div>
  <div class="wk-wrap"><div class="wk-head"><div class="wk-corner"></div>${dayHdrs}</div>
    <div class="wk-body"><div class="wk-times">${times}</div><div class="wk-grid">${cols}</div></div></div>`
}
function removeBlock(sid,day,start){
  const st=staffOf(sid);const i=(st.blocks||[]).findIndex(b=>b.day===day&&b.start===start)
  if(i<0)return
  showModal(`<h2>Blocco personale</h2><p style="font-size:13px;color:var(--ink2)">«${esc(st.blocks[i].label)}» — ${dayLbl(day)} ${fmt(start)}</p>
    <div class="modal-foot"><button class="btn btn-outline" onclick="closeModal()">Chiudi</button>
    <button class="btn btn-danger" onclick="staffOf('${sid}').blocks.splice(${i},1);closeModal();toast('Blocco rimosso');reRender()">Rimuovi blocco</button></div>`)

/* ═══════════ EVENTI: dettaglio, check-in, sposta, cancella ═══════════ */
function openEvt(id){
  const e=SESSIONS.find(x=>x.id===id);if(!e)return
  const svc=svcOf(e.svc), st=staffOf(e.staff)
  const canOp=ROLE!=='client'
  const stPill=e.status==='svolta'?'<span class="pill pill-ok">svolta</span>':e.status==='noshow'?'<span class="pill pill-danger">no-show</span>':'<span class="pill pill-accent">programmata</span>'
  let body=''
  if(e.roster){
    const wl=e.waitlist||[]
    body=`<div style="background:var(--card2);border:1px solid var(--border2);border-radius:var(--r);padding:12px">
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--ink3);margin-bottom:8px"><span>PARTECIPANTI</span><b style="color:${e.roster.length>=svc.max?'var(--warn)':'var(--accent)'}">${e.roster.length}/${svc.max}</b></div>
      ${e.roster.map((n,i)=>`<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px;border-bottom:1px solid var(--border)"><span>${esc(n)}</span>${canOp&&e.status==='prog'?`<span style="color:var(--danger);cursor:pointer;font-size:11px" onclick="rosterRemove('${e.id}',${i})">rimuovi</span>`:''}</div>`).join('')||'<div style="color:var(--ink3);font-size:12px">Nessun iscritto</div>'}
      ${wl.length?`<div style="font-size:11px;color:var(--warn);margin-top:8px">Lista d’attesa: ${wl.map(esc).join(', ')}</div>`:''}
      ${canOp&&e.status==='prog'&&e.roster.length<svc.max?`<button class="btn btn-outline btn-sm" style="margin-top:9px" onclick="rosterAdd('${e.id}')">+ Aggiungi partecipante</button>`:''}
    </div>`
  }else{
    body=`<div style="background:var(--card2);border:1px solid var(--border2);border-radius:var(--r);padding:12px">
      <div style="font-size:12px;color:var(--ink3);margin-bottom:4px">Cliente</div><div style="font-size:14px;font-weight:500">${esc(e.client)}</div></div>`
  }
  showModal(`<h2>${esc(svc.name)} ${stPill}</h2>
    ${e.rec?`<div style="margin-bottom:6px"><span class="pill pill-accent">↻ ricorrente — ogni settimana ×${e.rec}</span></div>`:''}
    ${e.noteTr&&ROLE!=='client'?`<div style="background:var(--card2);border-left:3px solid var(--warn);border-radius:6px;padding:7px 10px;font-size:12.5px;margin-bottom:6px">🗒 <b>Nota trainer:</b> ${esc(e.noteTr)}</div>`:''}
    ${e.noteCl?`<div style="background:var(--card2);border-left:3px solid var(--accent);border-radius:6px;padding:7px 10px;font-size:12.5px;margin-bottom:6px">📝 <b>Nota per il cliente:</b> ${esc(e.noteCl)}</div>`:''}
    <p style="color:var(--ink3);font-size:12px;margin-bottom:12px">${esc(st.name)} · ${dayLbl(e.day)} ${fmt(e.start)} — ${fmt(e.start+e.dur)} · ${svc.tok} gettoni</p>
    ${body}
    ${canOp&&e.status==='prog'?`<div class="modal-foot" style="justify-content:flex-start;border-top:1px solid var(--border);padding-top:12px">
      <button class="btn btn-outline btn-sm" onclick="checkin('${id}','svolta')">✓ Svolta</button>
      <button class="btn btn-outline btn-sm" onclick="checkin('${id}','noshow')">✗ No-show</button>
      <button class="btn btn-outline btn-sm" onclick="openMoveEvt('${id}')">↔ Sposta</button>
      <button class="btn btn-danger btn-sm" style="margin-left:auto" onclick="askCancelSession('${id}')">Cancella</button></div>`:''}
    <div class="modal-foot"><button class="btn btn-outline" onclick="closeModal()">Chiudi</button></div>`)
}
function promoteWaitlist(e,svc){
  while((e.waitlist||[]).length&&e.roster.length<svc.max){
    const next=e.waitlist.shift();const nc=byName(next)
    if(!nc)continue
    if(nc.tok<svc.tok){notify(['reception','admin'],'🪙','Lista d’attesa',`${next} non promosso: gettoni insufficienti`);continue}
    spendTok(nc,svc.tok,`${svc.name} ${dayLbl(e.day)} — promosso da lista d’attesa`)
    e.roster.push(next)
    BOOKINGS.unshift({id:'b'+Date.now()+Math.floor(Math.random()*999),client:nc.id,staff:e.staff,svc:svc.id,day:e.day,start:e.start,dur:e.dur,date:dayLbl(e.day),status:'confermata',sessId:e.id})
    notify(['client'],'🎉','Posto liberato!',`Sei stato promosso in ${svc.name} ${dayLbl(e.day)} ${fmt(e.start)}`)
    notify(['reception','admin'],'📅','Lista d’attesa',`${next} promosso in ${svc.name} ${dayLbl(e.day)}`)
    break
  }
}
function rosterRemove(id,i){
  const e=SESSIONS.find(x=>x.id===id);const name=e.roster[i]
  const c=byName(name);const svc=svcOf(e.svc)
  if(c&&ROLE==='admin')creditTok(c,svc.tok,`Rimosso da ${svc.name} ${dayLbl(e.day)} — rimborso admin`)
  else if(c)notify(['admin'],'🪙','Rimborso da valutare',`${c.name} rimosso da ${svc.name}: eventuale accredito solo da amministrazione`)
  e.roster.splice(i,1)
  if(c)BOOKINGS.forEach(b=>{if(b.sessId===e.id&&b.client===c.id&&b.status==='confermata')b.status='cancellata'})
  promoteWaitlist(e,svc)
  audit(`Rimosso ${name} da ${svc.name} ${dayLbl(e.day)}`);toast('Partecipante rimosso, gettoni rimborsati');closeModal();openEvt(id);saveState()
}
function rosterAdd(id){
  const e=SESSIONS.find(x=>x.id===id);const svc=svcOf(e.svc)
  const opts=CLIENTS.filter(c=>c.status==='attivo'&&!e.roster.includes(c.name)).map(c=>`<option value="${c.id}">${esc(c.name)} [${c.tok} gett]</option>`).join('')
  showModal(`<h2>Aggiungi a ${svc.name}</h2>
    <div class="form-row"><label>Cliente</label><select id="ra-c">${opts}</select></div>
    <div class="modal-foot"><button class="btn btn-outline" onclick="openEvt('${id}')">Indietro</button>

function saveEvt(blockMode,force,subOk){
  const g=x=>document.getElementById(x)
  const stv=g('ns-st').value
  const dv=+g('ns-d').value
  const [hh,mm]=g('ns-t').value.split(':').map(Number)
  const start=hh+mm/60
  const isBlock=blockMode||g('ns-tipo')?.value==='b'
  if(isBlock){
    const label=g('ns-blabel')?.value||'Non disponibile'
    const errs=conflictsFor(stv,dv,start,1).filter(x=>!x.includes('non lavora')&&!x.includes('Fuori'))
    if(errs.length&&!force){g('ns-err').innerHTML=esc(errs[0]);return}
    staffOf(stv).blocks.push({day:dv,start,dur:1,label})
    audit(`Blocco personale «${label}» ${dayLbl(dv)} ${fmt(start)}`);toast('Blocco creato');closeModal();reRender();return
  }
  const sv=svcOf(g('ns-sv').value)
  const cid=g('ns-cl').value
  const cl=CLIENTS.find(x=>x.id===cid)
  const errs=allChecks(stv,sv.id,dv,start,sv.dur/60)
  if(cl)errs.push(...clientBusy(cl,dv,start,sv.dur/60))
  const wcl=cl?walletOf(cl):null
  const hasPack=cl&&activePacks(cl).some(p=>p.svc===sv.id)
  const tokErr=cl&&!hasPack&&wcl.tok<sv.tok?`${cl.name} non ha gettoni sufficienti (${wcl.tok}/${sv.tok})`:null
  if(tokErr&&!subOk){
    g('ns-err').innerHTML=esc(tokErr)+`<div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap">
      <button class="btn btn-outline btn-sm" onclick="saveEvt(${blockMode?'true':'false'},${force?'true':'false'},true)">Porta sottosoglia (saldo ${(wcl.tok-sv.tok).toFixed(1)})</button>
      <button class="btn btn-outline btn-sm" onclick="closeModal();openCheckout(10,'${walletOf(cl).id}')">Ricarica ora</button></div>
      <div style="font-size:11px;color:var(--ink3);margin-top:4px">Il sottosoglia è consentito solo da reception/amministrazione — il cliente in autonomia non può.</div>`
    return}
  if(tokErr&&subOk){notify(['admin'],'⚠️','Cliente sottosoglia',`${cl.name} portato a ${(wcl.tok-sv.tok).toFixed(1)}🪙 da ${CURRENT_USER.name}`);audit(`SOTTOSOGLIA: ${cl.name} a ${(wcl.tok-sv.tok).toFixed(1)}🪙 autorizzato da ${CURRENT_USER.name}`)}
  if(errs.length&&!(force&&ROLE==='admin')){
    g('ns-err').innerHTML=errs.map(esc).join('<br>')+(ROLE==='admin'?`<div style="margin-top:6px"><button class="btn btn-outline btn-sm" onclick="saveEvt(false,true)">Forza comunque (registrato)</button></div>`:'')
    return
  }
  if(force)audit(`OVERRIDE conflitti su nuova sessione ${sv.name} ${dayLbl(dv)} ${fmt(start)}`)
  const isGroup=sv.type!=='ONE_TO_ONE'
  const rec=+((g('ns-rec')||{}).value||1)
  const noteTr=(g('ns-ntr')||{}).value||'', noteCl=(g('ns-ncl')||{}).value||''
  const sess={id:'e'+Date.now(),staff:stv,svc:sv.id,day:dv,start,dur:sv.dur/60,status:'prog'}
  if(rec>1)sess.rec=rec
  if(noteTr)sess.noteTr=noteTr
  if(noteCl)sess.noteCl=noteCl
  if(isGroup){sess.client=sv.name;sess.roster=cl?[cl.name]:[]}
  else{if(!cl){g('ns-err').textContent='Seleziona un cliente per una sessione individuale.';return}sess.client=cl.name;sess.clientId=cl.id}
  if(cl){for(let k=0;k<rec;k++)chargeFor(cl,sv,`${sv.name} — ${dayLbl(dv)} ${fmt(start)}${rec>1?` (ricorrente ${k+1}/${rec})`:''}`)}
  SESSIONS.push(sess)
  if(cl){const bid='b'+Date.now()
    if(isGroup){BOOKINGS.unshift({id:bid,client:cl.id,staff:stv,svc:sv.id,day:dv,start,dur:sv.dur/60,date:dayLbl(dv),status:'confermata',sessId:sess.id})}
    else{sess.bk=bid;BOOKINGS.unshift({id:bid,client:cl.id,staff:stv,svc:sv.id,day:dv,start,dur:sv.dur/60,date:dayLbl(dv),status:'confermata'})}}
  audit(`Creata ${sv.name} ${dayLbl(dv)} ${fmt(start)} (${staffOf(stv).name.split(' ')[0]}${cl?', '+cl.name:''})`)
  notify(['trainer'],'📅','Nuova sessione',`${sv.name} — ${dayLbl(dv)} ${fmt(start)}`)
  if(noteCl&&cl)notify(['client'],'📝','Nota dal centro',`${sv.name} ${dayLbl(dv)}: ${noteCl}`)
  toast('Sessione creata'+(rec>1?` — ricorrente ×${rec} settimane`:'')+(cl?` (addebitate ${rec>1?rec+' lezioni':'1 lezione'})`:''))
  closeModal();reRender()
}

function onCfImg(e){const f=e.target.files[0];if(!f)return

    const b=document.getElementById('cfAvaBox');if(b)b.innerHTML=`<img class="ava-img" src="${r.result}"><div class="ov">Foto</div>`}

/* cartella clinica — GDPR art.9: sanitari diretti; altri = break-glass con audit */
let BREAKGLASS={}
function clinicalBlock(c){
  const rec=CLINICAL[c.id]
  const isSanitario=ROLE==='trainer'&&staffOf(CURRENT_TRAINER)?.sanitario
  if(ROLE==='client'||ROLE==='reception')return ''
  if(!rec&&!isSanitario)return ''

  if(!isSanitario&&!BREAKGLASS[c.id])return `<div class="lock-note" style="margin-bottom:10px">🔒 <b>Cartella clinica riservata</b> (GDPR art.9) — accesso limitato ai professionisti sanitari.<br>
    <button class="btn btn-outline btn-sm" style="margin-top:8px" onclick="breakGlass('${c.id}')">Accesso d’emergenza (registrato)</button></div>`
  return `<div class="clin-card">
    <div class="ch"><span>🩺 CARTELLA CLINICA ${!isSanitario?'· <b style="color:var(--warn)">accesso d’emergenza attivo</b>':''}</span><span>consenso: ${esc(rec.consenso)}</span></div>
    <div style="font-size:13px;margin-bottom:7px"><b>Anamnesi:</b> ${esc(rec.anamnesi)}</div>

    <div style="font-size:11px;color:var(--ink3);margin:6px 0 3px">NOTE SEDUTE</div>
    ${rec.note.map(n=>`<div style="font-size:12px;padding:4px 0;border-top:1px solid var(--border)"><span style="color:var(--ink3)">${n.date} · ${esc(n.by)}:</span> ${esc(n.txt)}</div>`).join('')}
    ${isSanitario?`<button class="btn btn-outline btn-sm" style="margin-top:8px" onclick="addClinNote('${c.id}')">+ Nota seduta</button>`:''}
  </div>`
}

/* ═══════════ STAFF ═══════════ */
function buildStaff(){
  const per=window.STF_PER||'week', fRole=window.STF_ROLE||'', fSvc=window.STF_SVC||''
  let list=STAFF.filter(st=>(!fRole||st.roles.includes(fRole))&&(!fSvc||qualified(st.id,fSvc)))
  const statsOf=st=>{const mine=SESSIONS.filter(e=>e.staff===st.id)
    const wk=mine.length, hrs=mine.reduce((t,e)=>t+e.dur,0)
    const avH=Object.values(st.avail).reduce((t,[a,b])=>t+(b-a),0)
    const series=stfSeries(st)
    const sess=per==='week'?wk:per==='4w'?series.slice(2).reduce((a,b)=>a+b,0):allSess(st)
    return {sess,hrs:hrs.toFixed(0),avH,occ:avH?Math.round(hrs/avH*100):0,cl:clientiSeguiti(st)}}
  const stfVal=(st,k)=>{const s2=statsOf(st);return {name:st.name,sess:s2.sess,avH:s2.avH,occ:s2.occ,cl:s2.cl}[k]}
  const stS=window.TSORT.stf
  if(stS&&stS.k)list=[...list].sort((a,b)=>{const va=stfVal(a,stS.k),vb=stfVal(b,stS.k)
    const r=(typeof va==='number')?va-vb:String(va).localeCompare(String(vb),'it');return stS.asc?r:-r})
  else list=[...list].sort((a,b)=>statsOf(b).sess-statsOf(a).sess)
  const perLbl={week:'questa settimana','4w':'ultime 4 settimane',all:'da sempre'}[per]
  C().innerHTML=`
  <div class="sec-head"><h2>Staff (${list.length}${list.length!==STAFF.length?' di '+STAFF.length:''})</h2>${ROLE==='admin'?`<button class="btn btn-accent" onclick="openStaffEdit()">+ Aggiungi</button>`:''}</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
    <select class="selin" onchange="window.STF_ROLE=this.value;buildStaff()"><option value="">Tutti i ruoli</option>${allRoles().map(r=>`<option ${fRole===r?'selected':''}>${esc(r)}</option>`).join('')}</select>
    <select class="selin" onchange="window.STF_SVC=this.value;buildStaff()"><option value="">Tutti i servizi</option>${SVCS.map(sv=>`<option value="${sv.id}" ${fSvc===sv.id?'selected':''}>${esc(sv.name)}</option>`).join('')}</select>
    <select class="selin" onchange="window.STF_PER=this.value;buildStaff()"><option value="week" ${per==='week'?'selected':''}>Questa settimana</option><option value="4w" ${per==='4w'?'selected':''}>Ultime 4 settimane</option><option value="all" ${per==='all'?'selected':''}>Da sempre</option></select>
  </div>

function roleFilter(){

  const el=document.getElementById('st-rq-l');el.style.display='block'
  el.innerHTML=hits.map(r=>`<div class="combo-it" onmousedown="roleAdd('${esc(r)}')"><span>${esc(r)}</span></div>`).join('')

function buildServizi(){
  const TL={ONE_TO_ONE:'1:1',ONE_TO_TWO:'1:2',ONE_TO_MANY:'1:N',MANY_TO_MANY:'N:N'}
  const usage=id=>SESSIONS.filter(e=>e.svc===id).length
  const tokSp=id=>SESSIONS.filter(e=>e.svc===id).reduce((t,e)=>t+((e.roster?e.roster.length:1)*(svcOf(id).tok)),0)
  const topRank=[...SVCS].sort((a,b)=>usage(b.id)-usage(a.id))
  const svVal=(sv,k)=>({name:sv.name,tl:TL[sv.type],use:usage(sv.id),tokS:tokSp(sv.id),dur:sv.dur,tok:sv.tok,maxP:sv.max,vat:sv.vat||'22',req:(sv.req||[]).join(', ')})[k]
  const svS=window.TSORT.svc
  let ranked=[...SVCS]
  if(svS&&svS.k)ranked.sort((a,b)=>{const va=svVal(a,svS.k),vb=svVal(b,svS.k)
    const r=(typeof va==='number')?va-vb:String(va).localeCompare(String(vb),'it',{numeric:true});return svS.asc?r:-r})
  else ranked.sort((a,b)=>usage(b.id)-usage(a.id))
  const mxU=usage(topRank[0].id)||1
  C().innerHTML=`
  <div class="sec-head"><h2>Servizi (${SVCS.length})</h2><button class="btn btn-accent" onclick="openSvcEdit()">+ Nuovo</button></div>
  <div class="panel" style="margin-bottom:14px"><h3>📊 I più usati questa settimana <span style="margin-left:auto;font-size:10px;color:var(--ink3)">sessioni in calendario</span></h3>
    ${topRank.slice(0,5).map(sv=>`<div style="margin-bottom:7px"><div style="display:flex;justify-content:space-between;font-size:12px"><span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${sv.color};margin-right:6px"></span>${esc(sv.name)}</span><b>${usage(sv.id)} sess · 🪙${tokSp(sv.id)}</b></div>
    <div class="pbar" style="margin-top:3px"><i style="width:${Math.round(usage(sv.id)/mxU*100)}%;background:${sv.color}"></i></div></div>`).join('')}</div>
  <div class="tbl-wrap"><div class="tbl-scroll"><table><thead><tr>
    ${ths('svc','name','Servizio','buildServizi')}${ths('svc','tl','Tipo','buildServizi')}${ths('svc','use','Sessioni sett.','buildServizi')}${ths('svc','tokS','🪙 spesi','buildServizi')}${ths('svc','dur','Durata','buildServizi')}${ths('svc','tok','Gettoni','buildServizi')}${ths('svc','maxP','Partecipanti','buildServizi')}${ths('svc','req','Abilitati','buildServizi')}${ths('svc','vat','IVA','buildServizi')}<th></th>
  </tr></thead><tbody>
  ${ranked.map(s=>`<tr onclick="openSvcEdit('${s.id}')" style="cursor:pointer">
    <td><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${s.color};margin-right:8px;vertical-align:middle"></span><strong>${esc(s.name)}</strong></td>
    <td><span class="pill pill-accent">${TL[s.type]}</span></td>
    <td style="font-weight:700">${usage(s.id)}</td><td>🪙${tokSp(s.id)}</td><td>${s.dur} min</td>
    <td><span style="color:var(--accent);font-weight:700">${s.tok}</span></td>
    <td>${s.min===1&&s.max===1?'1':s.min+'–'+s.max}</td>
    <td style="font-size:11px;color:var(--ink3)">${(s.req||[]).join(', ')}</td>
    <td>${s.vat==='esente'?'<span class="pill pill-ok">esente art.10</span>':'22%'}</td>
    <td><button class="btn btn-outline btn-sm" onclick="event.stopPropagation();openSvcEdit('${s.id}')">Modifica</button></td>
  </tr>`).join('')}
  </tbody></table></div></div>`
}

function misFilter(){

  C().innerHTML=`<div class="sec-head"><h2>I miei progressi</h2></div><div id="misBody"></div>`
  buildMisFor(idx)

function weeklyZoom(arr){if(arr.length<2)return arr;const a=arr[arr.length-2],b=arr[arr.length-1];return Array.from({length:6},(_,i)=>+(a+(b-a)*i/5).toFixed(1))}
function buildMisFor(idx){
  const c=CLIENTS[+idx], kg=misUnit==='kg', monthly=misRange==='mese'
  if(!c.weight.length){document.getElementById('misBody').innerHTML=`<div class="panel" style="text-align:center;color:var(--ink3)">Nessuna misurazione ancora registrata.${ROLE!=='client'?`<div style="margin-top:10px"><button class="btn btn-accent btn-sm" onclick="openMisForm('${c.id}')">+ Prima misurazione</button></div>`:''}</div>`;return}
  const mLabels=MONTHS.slice(1,1+c.weight.length)
  const labels=monthly?mLabels:weekLabels(c.weight.length)
  let W=c.weight
  let fatD=kg?c.weight.map((w,i)=>+(w*c.fat_pct[i]/100).toFixed(1)):c.fat_pct
  let musD=kg?c.muscle_kg:c.muscle_kg.map((m,i)=>+((m/c.weight[i])*100).toFixed(1))
  let wat=c.water_pct, bmi=c.bmi, met=c.metage
  if(!monthly){W=weeklyZoom(W);fatD=weeklyZoom(fatD);musD=weeklyZoom(musD);wat=weeklyZoom(wat);bmi=weeklyZoom(bmi);met=weeklyZoom(met)}
  const last=a=>a[a.length-1]
  const toGoal=c.goalWeight?(c.goalWeight<c.weight[0]?last(W)-c.goalWeight:c.goalWeight-last(W)):null
  const goalsStrip=`<div class="panel" style="margin-bottom:14px;padding:12px 16px"><div style="display:flex;gap:22px;flex-wrap:wrap;font-size:13px;align-items:center">

function drawChart(id,data,color,labels,H,goal){
  const cv=document.getElementById(id);if(!cv||!data.length)return
  const dpr=window.devicePixelRatio||1, W=cv.offsetWidth||300;H=H||120
  cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px'
  const ctx=cv.getContext('2d');ctx.scale(dpr,dpr)
  const p={t:14,r:10,b:22,l:40}, cw=W-p.l-p.r, ch=H-p.t-p.b, N=data.length
  let mn=Math.min(...data),mx=Math.max(...data);if(goal!=null){mn=Math.min(mn,goal);mx=Math.max(mx,goal)}const rng=mx-mn||1;mn-=rng*.1;mx+=rng*.1
  const xOf=i=>p.l+(N>1?(i/(N-1))*cw:cw/2), yOf=v=>p.t+ch-((v-mn)/(mx-mn))*ch
  const LT=document.body.classList.contains('light')
  if(LT&&color==='#8FFF00')color='#4d9f00'
  ctx.strokeStyle=LT?'rgba(0,0,0,.08)':'rgba(255,255,255,.05)';ctx.lineWidth=1
  for(let i=0;i<=3;i++){const y=p.t+ch*i/3;ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(p.l+cw,y);ctx.stroke()}
  ctx.fillStyle=LT?'rgba(0,0,0,.5)':'rgba(255,255,255,.3)';ctx.font='9px sans-serif';ctx.textAlign='right'
  for(let i=0;i<=2;i++){const v=mn+(mx-mn)*i/2;ctx.fillText(v>=1000?(v/1000).toFixed(1)+'k':v.toFixed(1),p.l-3,yOf(v)+3)}
  ctx.textAlign='center';(labels||[]).forEach((l,i)=>ctx.fillText(l,xOf(i),H-5))
  const pts=data.map((v,i)=>({x:xOf(i),y:yOf(v)}))
  ctx.beginPath();ctx.moveTo(pts[0].x,p.t+ch);pts.forEach(pt=>ctx.lineTo(pt.x,pt.y));ctx.lineTo(pts[N-1].x,p.t+ch);ctx.closePath()
  const g=ctx.createLinearGradient(0,p.t,0,p.t+ch);g.addColorStop(0,color+'44');g.addColorStop(1,color+'00');ctx.fillStyle=g;ctx.fill()
  ctx.beginPath();pts.forEach((pt,i)=>i?ctx.lineTo(pt.x,pt.y):ctx.moveTo(pt.x,pt.y));ctx.strokeStyle=color;ctx.lineWidth=2;ctx.stroke()
  pts.forEach(pt=>{ctx.beginPath();ctx.arc(pt.x,pt.y,3,0,Math.PI*2);ctx.fillStyle=color;ctx.fill()})
  if(goal!=null){const gy=yOf(goal);ctx.strokeStyle=color;ctx.globalAlpha=.55;ctx.setLineDash([4,4]);ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(p.l,gy);ctx.lineTo(p.l+cw,gy);ctx.stroke();ctx.setLineDash([]);ctx.globalAlpha=1;ctx.fillStyle=color;ctx.font='9px sans-serif';ctx.textAlign='left';ctx.fillText('obiettivo '+goal,p.l+3,gy-3)}
}

function calcSim(){
  const out=document.getElementById('sim-out');if(!out)return
  const tokW=[...document.querySelectorAll('.sim-q')].reduce((t,i)=>t+(+i.value||0)*(+i.dataset.tok),0)
  const months=+document.getElementById('sim-m').value
  const c=CLIENTS.find(x=>x.id===document.getElementById('sim-c').value)
  const cum0=c?(walletOf(c).cumTok||0):0
  if(!tokW){out.innerHTML='<div style="font-size:12.5px;color:var(--ink3)">Imposta almeno una frequenza.</div>';return}
  const need=Math.ceil(tokW*4.33*months)
  const lvAfter=[...LEVELS].reverse().find(l=>cum0+need>=l.min)||LEVELS[0]
  const tot=need*lvAfter.p, monthly=tot/months
  const nxt=LEVELS.find(l=>l.min>cum0+need)
  let upsell=''
  if(nxt&&(nxt.min-cum0-need)<=need*0.25){
    const q2=nxt.min-cum0, t2=q2*nxt.p
    upsell=`<div style="margin-top:8px;padding:9px 11px;border:1px dashed var(--accent);border-radius:9px;font-size:12.5px">
      💡 <b>Upsell:</b> con <b>${q2} gettoni</b> (+${q2-need}) scatta il livello <b>${nxt.k}</b> a €${nxt.p.toFixed(2)}/gettone → €${t2.toFixed(0)} totali${t2<tot?` — <b style="color:var(--ok)">risparmia €${(tot-t2).toFixed(0)}</b>`:` (gettoni in più a prezzo migliore, restano validi)`}.</div>`
  }
  out.innerHTML=`<div class="panel" style="background:var(--ad)">
    <div style="display:flex;justify-content:space-between;font-size:13px;padding:3px 0"><span>Gettoni/settimana</span><b>${tokW}</b></div>
    <div style="display:flex;justify-content:space-between;font-size:13px;padding:3px 0"><span>Gettoni per ${months} mes${months===1?'e':'i'}</span><b>${need} 🪙</b></div>
    <div style="display:flex;justify-content:space-between;font-size:13px;padding:3px 0"><span>Livello all'acquisto</span><b>${lvAfter.k} — €${lvAfter.p.toFixed(2)}/gettone</b></div>
    <div style="display:flex;justify-content:space-between;font-size:15px;padding:6px 0;border-top:1px solid var(--border2);margin-top:4px"><span><b>Totale</b></span><b style="color:var(--accent)">€${tot.toFixed(0)}</b></div>
    <div style="display:flex;justify-content:space-between;font-size:13px;padding:3px 0"><span>«Ti costa come»</span><b>€${monthly.toFixed(0)}/mese</b></div></div>${upsell}
  <button class="btn btn-accent" style="width:100%;justify-content:center;margin-top:10px" onclick="closeModal();openCheckout(${need},'${c?c.id:'c1'}')">Procedi alla ricarica di ${need} gettoni →</button>`
}

  const srt=window.SHOP_SORT||'custom'
  if(srt==='name')l=[...l].sort((a,b)=>a.name.localeCompare(b.name))
  else if(srt==='price')l=[...l].sort((a,b)=>a.price-b.price)
  else if(srt==='priceD')l=[...l].sort((a,b)=>b.price-a.price)
  else l=[...l].sort((a,b)=>a.ord-b.ord)

function moveProd(id,dir){

  const descTxt=CART.map(i=>i.name+'×'+i.qty).join(', ')+(disc>=100?' (OMAGGIO)':disc>0?` (sconto ${disc}%)`:'')

  if(credit)audit(`Bar: vendita A CREDITO €${tot.toFixed(2)} («${descTxt}»)`)
  const num=addPayment('Bar',descTxt,'Bar/Shop',tot,m,'22',credit?'attesa':undefined)
  showModal(`<div class="pay-ok"><div class="em">✓</div><h2 style="margin:8px 0">Incasso registrato</h2>

}

/* export CSV con fallback copia */
function exportCSV(kind){
  let rows,name
  if(kind==='pagamenti'){name='pagamenti';rows=[['numero','data','cliente','descrizione','linea','metodo','iva','importo','stato'],...PAYMENTS.map(p=>[p.num,p.date,p.client,p.desc,p.line,p.method,p.vat,p.amount.toFixed(2).replace('.',','),p.status])]}
  else if(kind==='clienti'){name='clienti';rows=[['nome','email','telefono','cf','obiettivo','stato','gettoni','trainer','dal'],...CLIENTS.map(c=>[c.name,c.email,c.tel,c.cf,c.obj,c.status,c.tok,staffOf(c.trainer)?.name||'',c.since])]}
  else return
  const csv=rows.map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(';')).join('\n')
  try{
    const a=document.createElement('a')
    a.href=URL.createObjectURL(new Blob(['﻿'+csv],{type:'text/csv'}))
    a.download=`moveo-${name}-2026-07.csv`;a.click()
    toast('CSV scaricato');audit(`Export CSV ${name}`)
  }catch(e){
    showModal(`<h2>Export CSV — ${name}</h2><p style="font-size:12px;color:var(--ink3);margin-bottom:8px">Il download diretto è bloccato in questo ambiente: copia il contenuto.</p>
      <textarea rows="10" style="width:100%;background:var(--card2);border:1px solid var(--border2);border-radius:8px;color:var(--ink);font-size:11px;padding:8px">${esc(csv)}</textarea>
      <div class="modal-foot"><button class="btn btn-accent" onclick="closeModal()">Chiudi</button></div>`)
  }
}
